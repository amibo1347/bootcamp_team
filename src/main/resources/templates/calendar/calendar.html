<!-- ======================================================== -->
<!-- [일정 조회 페이지] : templates/calendar/calendar.html — 모달은 calendar/calendar-*-modal -->
<!-- ======================================================== -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>일정 조회 | 인트라넷</title>
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <!-- 본인 회원 ID: 일정 셀의 공유자 동그라미에서 본인 제외용 (calendar-init.js 가 읽음) -->
  <meta name="cal-current-member-id" th:content="${currentMemberId}" />
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  <!--
      [캘린더 전용] FullCalendar 월 뷰 일정 칩 스타일
      - "3p" 접두어: 라이브러리 기본(시간 일정 앞에 짧은 시각 표시). 동작 변경은 static/js/calendar/calendar-init.js 의 views.dayGridMonth.displayEventTime 참고.
      - 카테고리 색 반투명 박스: 이벤트 배경색은 JS(hex→rgba)에서 설정, 여기서는 모서리·여백·글자색만 보조.
    -->
  <style>
    #calendar .fc-daygrid-event {
      border-radius: 0.375rem;
      border-width: 1px;
      padding: 0.125rem 0.375rem;
      margin-bottom: 0.125rem;
    }

    /* 캘린더 본문 스크롤러 — 잔존 OS 스크롤바 화살표 숨김 */
    #calendar .fc-scroller {
      scrollbar-width: none;
      /* Firefox */
      -ms-overflow-style: none;
      /* 구 IE/Edge */
    }

    #calendar .fc-scroller::-webkit-scrollbar {
      /* Chromium/WebKit */
      width: 0;
      height: 0;
      display: none;
    }

    #calendar .fc-daygrid-event .fc-event-title {
      font-weight: 500;
      font-size: 0.8125rem;
      line-height: 1.25rem;
      color: rgb(30 41 59);
    }

    .dark #calendar .fc-daygrid-event .fc-event-title {
      color: rgb(241 245 249);
    }

    /*
      주/일 뷰 시간 슬롯 일정: FullCalendar 기본 텍스트가 흰색이라 카테고리 옅은 배경 위에서 안 보임
      → 종일(daygrid) 처럼 어두운 색으로 강제. eventContent 가 렌더하는 .fc-event-title 과
        FullCalendar 가 직접 그리는 시간 텍스트(.fc-event-time) / 메인 컨테이너 모두 적용.
    */
    #calendar .fc-timegrid-event .fc-event-title,
    #calendar .fc-timegrid-event .fc-event-time,
    #calendar .fc-timegrid-event .fc-event-main {
      color: rgb(30 41 59) !important;
    }
    .dark #calendar .fc-timegrid-event .fc-event-title,
    .dark #calendar .fc-timegrid-event .fc-event-time,
    .dark #calendar .fc-timegrid-event .fc-event-main {
      color: rgb(241 245 249) !important;
    }

    /* 툴바 왼쪽: 이전/다음 옆에 일정 추가(+)·카테고리(태그) 아이콘만 — 스타일은 calendar-init.js 에서 SVG 삽입 후 적용 */
    #calendar .fc-header-toolbar .fc-toolbar-chunk:first-child {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }

    #calendar .fc-addEventButton-button {
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      min-height: 2.5rem;
      padding: 0.5rem !important;
    }

    #calendar .fc-categoryButton-button {
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      min-width: 2.5rem;
      min-height: 2.5rem;
      padding: 0.5rem !important;
      border-radius: 0.75rem;
      border: 1px solid rgb(229 231 235) !important;
      background-color: rgb(255 255 255) !important;
      color: rgb(55 65 81) !important;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }

    #calendar .fc-categoryButton-button:hover {
      background-color: rgb(249 250 251) !important;
    }

    .dark #calendar .fc-categoryButton-button {
      border-color: rgb(55 65 81) !important;
      background-color: rgb(17 24 39) !important;
      color: rgb(229 231 235) !important;
    }

    .dark #calendar .fc-categoryButton-button:hover {
      background-color: rgb(31 41 55) !important;
    }

    /*
      오늘(todayCal) 버튼 — categoryButton 과 같은 톤. 텍스트 색을 명시해서 "오늘" 글자가 보이도록.
      FullCalendar 기본 스타일은 흰 배경 + 옅은 텍스트라 우리 페이지에서 텍스트가 묻혀 빈 박스처럼 보이던 문제 해결.
    */
    #calendar .fc-todayCal-button {
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      min-width: auto !important;
      width: auto !important;
      min-height: 2.5rem;
      padding: 0.5rem 0.875rem !important;
      border-radius: 0.75rem;
      border: 1px solid rgb(229 231 235) !important;
      background-color: rgb(255 255 255) !important;
      color: rgb(55 65 81) !important;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.25rem;
      white-space: nowrap !important;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }

    #calendar .fc-todayCal-button:hover {
      background-color: rgb(249 250 251) !important;
    }

    .dark #calendar .fc-todayCal-button {
      border-color: rgb(55 65 81) !important;
      background-color: rgb(17 24 39) !important;
      color: rgb(229 231 235) !important;
    }

    .dark #calendar .fc-todayCal-button:hover {
      background-color: rgb(31 41 55) !important;
    }
  </style>
</head>

<body
  x-data="{ page: 'calendar', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
  x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'dark bg-gray-900': darkMode === true}">
  <!-- ===== Preloader Start ===== -->
  <div th:replace="~{partials/preloader}"></div>
  <!-- ===== Preloader End ===== -->

  <!-- ===== Page Wrapper Start ===== -->
  <div class="flex h-screen overflow-hidden">
    <!-- ===== Sidebar Start ===== -->
    <div th:replace="~{partials/sidebar}"></div>
    <!-- ===== Sidebar End ===== -->

    <!-- ===== Content Area Start ===== -->
    <!-- managingDept / managingPosition 과 동일: flex-col · padding 은 main(p-8) 에서 통일 -->
    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <!-- Small Device Overlay Start -->
      <div th:replace="~{partials/overlay}"></div>
      <!-- Small Device Overlay End -->

      <!-- ===== Header Start ===== -->
      <div th:replace="~{partials/header}"></div>
      <!-- ===== Header End ===== -->

      <!-- ===== Main Content Start ===== -->
      <main class="p-8 space-y-8">
        <!-- [페이지 제목] 부서·직급 관리 페이지와 동일 ml-2 + 동일 타이포 -->
        <h2 class="ml-2 text-2xl font-black text-gray-900 dark:text-white">캘린더</h2>

        <div class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
          <div id="calendar" class="min-h-screen"></div>
        </div>
      </main>
      <!-- ===== Main Content End ===== -->

      <!-- BEGIN MODAL : 일정 조회 / 일정 편집 / 카테고리 — fixed 라 main 의 space-y 에 포함하지 않음 -->
      <div th:replace="~{calendar/calendar-view-modal}"></div>
      <div th:replace="~{calendar/calendar-event-modal}"></div>
      <div th:replace="~{calendar/calendar-category-modal}"></div>
      <!-- END MODAL -->
    </div>
    <!-- ===== Content Area End ===== -->
  </div>
  <!-- ===== Page Wrapper End ===== -->
  <script type="module" src="/js/index.js"></script>
</body>

</html>
