  <!-- [캘린더 이벤트 모달] 일정 추가/수정 — 헤더·스크롤 본문·하단 액션 분리 -->
<div
  class="fixed inset-0 z-99999 flex hidden items-center justify-center overflow-y-auto p-4 sm:p-6"
  id="eventModal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="eventModalLabel"
>
  <!-- 배경 딤 -->
  <div
    class="modal-close-btn fixed inset-0 z-0 bg-gray-900/40 backdrop-blur-sm dark:bg-gray-950/60"
  ></div>

  <!-- 패널 -->
  <div
    class="relative z-10 flex w-full max-w-2xl flex-col overflow-hidden rounded-2xl border border-stroke bg-white shadow-2xl ring-1 ring-black/5 dark:border-strokedark dark:bg-boxdark dark:ring-white/10"
    style="max-height: min(92vh, 880px)"
  >
    <!-- [헤더] -->
    <header
      class="flex shrink-0 items-start justify-between gap-4 border-b border-gray-100 px-5 py-4 sm:px-6 sm:py-5 dark:border-gray-800"
    >
      <div class="min-w-0 pr-8">
        <h2
          class="text-lg font-semibold text-gray-900 dark:text-white sm:text-xl"
          id="eventModalLabel"
        >
          일정 등록
        </h2>
        <p class="mt-1 text-sm leading-relaxed text-gray-500 dark:text-gray-400">
          제목과 일시를 입력하고 저장하면 캘린더에 반영됩니다.
        </p>
      </div>
      <button
        type="button"
        class="modal-close-btn -mr-1 -mt-1 shrink-0 rounded-full p-2 text-gray-400 transition hover:bg-gray-100 hover:text-gray-600 dark:hover:bg-white/10 dark:hover:text-gray-200"
        aria-label="모달 닫기"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </header>

    <!-- [스크롤 영역] -->
    <div class="min-h-0 flex-1 overflow-y-auto px-5 py-5 sm:px-6 custom-scrollbar">
      <p
        id="calendar-event-form-error"
        class="mb-5 hidden rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800 dark:border-rose-900/60 dark:bg-rose-950/50 dark:text-rose-200"
        role="alert"
      ></p>

      <form id="calendarEventForm" class="space-y-8" novalidate>
        <input type="hidden" id="calendar-id" name="calendarId" value="" />

        <!-- 공통 입력 칸 스타일 (주석: 클래스 통일로 폼 품질 유지) -->
        <!-- input: rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white -->

        <!-- 기본 정보 -->
        <section class="space-y-4" aria-labelledby="cal-sec-basic">
          <h3
            id="cal-sec-basic"
            class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500"
          >
            기본 정보
          </h3>
          <div class="space-y-4">
            <div>
              <label for="calendar-title" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                제목 <span class="text-rose-500">*</span>
              </label>
              <input
                type="text"
                id="calendar-title"
                name="title"
                required
                maxlength="500"
                placeholder="어떤 일정인가요?"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white dark:placeholder:text-gray-500"
              />
            </div>
            <div>
              <label for="calendar-description" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                설명
              </label>
              <textarea
                id="calendar-description"
                name="description"
                rows="3"
                placeholder="메모·안건 등 (선택)"
                class="w-full resize-y rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white dark:placeholder:text-gray-500"
              ></textarea>
            </div>
            <div>
              <label for="calendar-location" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                장소
              </label>
              <input
                type="text"
                id="calendar-location"
                name="location"
                maxlength="500"
                placeholder="회의실, 주소 등"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white dark:placeholder:text-gray-500"
              />
            </div>
            <div>
              <label for="calendar-category-id" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                카테고리
              </label>
              <select
                id="calendar-category-id"
                name="categoryId"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
              >
                <option value="">선택 안 함</option>
              </select>
              <p class="mt-1.5 text-xs text-gray-500 dark:text-gray-400">
                막대 색은 카테고리 관리에서 지정한 색이 적용됩니다.
              </p>
            </div>
          </div>
        </section>

        <!-- 일시 -->
        <section class="space-y-4 border-t border-gray-100 pt-8 dark:border-gray-800" aria-labelledby="cal-sec-time">
          <h3
            id="cal-sec-time"
            class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500"
          >
            일시
          </h3>
          <label
            class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 transition hover:bg-gray-100 dark:border-gray-700 dark:bg-white/[0.04] dark:hover:bg-white/[0.06]"
          >
            <input
              type="checkbox"
              id="calendar-all-day"
              name="allDay"
              class="h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500 dark:border-gray-600"
            />
            <span class="text-sm font-medium text-gray-800 dark:text-gray-200">종일 일정</span>
          </label>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label for="calendar-start-at" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                시작 <span class="text-rose-500">*</span>
              </label>
              <input
                type="datetime-local"
                id="calendar-start-at"
                name="startAt"
                required
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
              />
            </div>
            <div>
              <label for="calendar-end-at" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                종료
              </label>
              <input
                type="datetime-local"
                id="calendar-end-at"
                name="endAt"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
              />
            </div>
          </div>
        </section>

        <!-- 반복 -->
        <section class="space-y-4 border-t border-gray-100 pt-8 dark:border-gray-800" aria-labelledby="cal-sec-repeat">
          <h3 id="cal-sec-repeat" class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">
            반복
          </h3>
          <label
            class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 transition hover:bg-gray-100 dark:border-gray-700 dark:bg-white/[0.04] dark:hover:bg-white/[0.06]"
          >
            <input
              type="checkbox"
              id="calendar-is-repeat"
              name="isRepeat"
              class="h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500 dark:border-gray-600"
            />
            <span class="text-sm font-medium text-gray-800 dark:text-gray-200">반복 일정</span>
          </label>
          <div id="calendar-repeat-fields" class="grid gap-4 opacity-50 pointer-events-none sm:grid-cols-2">
            <div>
              <label for="calendar-repeat-type" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                반복 유형
              </label>
              <select
                id="calendar-repeat-type"
                name="repeatType"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
              >
                <option value="DAILY">매일</option>
                <option value="WEEKLY">매주</option>
                <option value="MONTHLY">매월</option>
                <option value="YEARLY">매년</option>
              </select>
            </div>
            <div>
              <label for="calendar-repeat-end-at" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
                반복 종료 일시
              </label>
              <input
                type="datetime-local"
                id="calendar-repeat-end-at"
                name="repeatEndAt"
                class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
              />
            </div>
          </div>
        </section>

        <!-- 알림 -->
        <section class="space-y-4 border-t border-gray-100 pt-8 dark:border-gray-800" aria-labelledby="cal-sec-alert">
          <h3 id="cal-sec-alert" class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">
            알림
          </h3>
          <label
            class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 transition hover:bg-gray-100 dark:border-gray-700 dark:bg-white/[0.04] dark:hover:bg-white/[0.06]"
          >
            <input
              type="checkbox"
              id="calendar-is-alert"
              name="isAlert"
              class="h-4 w-4 rounded border-gray-300 text-brand-500 focus:ring-brand-500 dark:border-gray-600"
            />
            <span class="text-sm font-medium text-gray-800 dark:text-gray-200">시작 전 알림</span>
          </label>
          <div id="calendar-alert-fields" class="opacity-50 pointer-events-none">
            <label for="calendar-alert-minutes" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">
              알림 시점
            </label>
            <select
              id="calendar-alert-minutes"
              name="alertMinutesBefore"
              class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
            >
              <option value="5">5분 전</option>
              <option value="10">10분 전</option>
              <option value="15">15분 전</option>
              <option value="30">30분 전</option>
              <option value="60">1시간 전</option>
              <option value="120">2시간 전</option>
              <option value="1440">1일 전</option>
            </select>
          </div>
        </section>

        <!-- 공개 범위 -->
        <section class="space-y-4 border-t border-gray-100 pt-8 dark:border-gray-800" aria-labelledby="cal-sec-vis">
          <h3 id="cal-sec-vis" class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">
            공개 범위
          </h3>
          <div class="grid grid-cols-1 gap-2 sm:grid-cols-2">
            <label
              class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 p-3 transition has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 hover:border-gray-300 dark:border-gray-700 dark:has-[:checked]:border-brand-400 dark:has-[:checked]:bg-brand-500/15 dark:hover:border-gray-600"
            >
              <input type="radio" name="visibility" value="PRIVATE" checked class="h-4 w-4 border-gray-300 text-brand-500 focus:ring-brand-500" />
              <span class="text-sm font-medium text-gray-800 dark:text-gray-200">나만 보기</span>
            </label>
            <label
              class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 p-3 transition has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 hover:border-gray-300 dark:border-gray-700 dark:has-[:checked]:border-brand-400 dark:has-[:checked]:bg-brand-500/15 dark:hover:border-gray-600"
            >
              <input type="radio" name="visibility" value="COMPANY" class="h-4 w-4 border-gray-300 text-brand-500 focus:ring-brand-500" />
              <span class="text-sm font-medium text-gray-800 dark:text-gray-200">전사</span>
            </label>
            <label
              class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 p-3 transition has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 hover:border-gray-300 dark:border-gray-700 dark:has-[:checked]:border-brand-400 dark:has-[:checked]:bg-brand-500/15 dark:hover:border-gray-600"
            >
              <input type="radio" name="visibility" value="DEPARTMENT" class="h-4 w-4 border-gray-300 text-brand-500 focus:ring-brand-500" />
              <span class="text-sm font-medium text-gray-800 dark:text-gray-200">특정 부서</span>
            </label>
            <label
              class="flex cursor-pointer items-center gap-3 rounded-xl border border-gray-200 p-3 transition has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50 hover:border-gray-300 dark:border-gray-700 dark:has-[:checked]:border-brand-400 dark:has-[:checked]:bg-brand-500/15 dark:hover:border-gray-600"
            >
              <input type="radio" name="visibility" value="SPECIFIC" class="h-4 w-4 border-gray-300 text-brand-500 focus:ring-brand-500" />
              <span class="text-sm font-medium text-gray-800 dark:text-gray-200">특정 인원</span>
            </label>
          </div>

          <div id="calendar-share-dept-wrap" class="hidden space-y-2">
            <label for="calendar-share-depts" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
              공유 부서
            </label>
            <p class="text-xs text-gray-500 dark:text-gray-400">Ctrl / ⌘ + 클릭으로 여러 부서 선택</p>
            <select
              id="calendar-share-depts"
              name="shareDeptIds"
              multiple
              size="6"
              class="max-h-40 w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
            ></select>
          </div>

          <div id="calendar-share-member-wrap" class="hidden space-y-2">
            <label for="calendar-share-members" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
              공유 멤버
            </label>
            <p class="text-xs text-gray-500 dark:text-gray-400">Ctrl / ⌘ + 클릭으로 여러 명 선택</p>
            <select
              id="calendar-share-members"
              name="shareMemberIds"
              multiple
              size="6"
              class="max-h-40 w-full rounded-xl border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/25 dark:border-gray-600 dark:bg-gray-800/60 dark:text-white"
            ></select>
          </div>
        </section>
      </form>
    </div>

    <!-- [하단 액션] 폼 밖에 두어 스크롤과 분리 -->
    <footer
      class="flex shrink-0 flex-wrap items-center justify-between gap-3 border-t border-gray-100 bg-gray-50/90 px-5 py-4 backdrop-blur-sm dark:border-gray-800 dark:bg-gray-900/80 sm:px-6"
    >
      <button
        type="button"
        id="btn-calendar-cancel"
        class="rounded-xl border border-gray-300 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 shadow-sm transition hover:bg-gray-50 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-200 dark:hover:bg-gray-700"
      >
        취소
      </button>
      <div class="flex flex-wrap items-center justify-end gap-2">
        <button
          type="button"
          id="btn-calendar-delete"
          class="hidden rounded-xl border border-rose-200 bg-white px-4 py-2.5 text-sm font-medium text-rose-600 shadow-sm transition hover:bg-rose-50 dark:border-rose-900/50 dark:bg-gray-800 dark:text-rose-400 dark:hover:bg-rose-950/40"
        >
          삭제
        </button>
        <button
          type="button"
          id="btn-calendar-submit"
          class="rounded-xl bg-brand-500 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
        >
          등록
        </button>
        <button
          type="button"
          id="btn-calendar-update"
          class="hidden rounded-xl bg-brand-500 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
        >
          수정
        </button>
      </div>
    </footer>
  </div>
</div>
