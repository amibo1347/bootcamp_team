<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- [카드] 주간 일정(월~금) — 그리드 셀 내 스크롤 허용(일정 다량 시) -->
    <section
      th:fragment="weekCard"
      class="flex h-full min-h-0 flex-col rounded-xl border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800"
    >
      <header
        class="flex shrink-0 items-center justify-between border-b border-gray-100 px-3.5 py-2.5 dark:border-gray-700"
      >
        <h2 class="text-sm font-semibold text-gray-800 dark:text-white">
          주간 일정
        </h2>
        <span
          id="home-week-range-label"
          class="text-xs text-gray-500 dark:text-gray-400"
        ></span>
      </header>
      <div class="page-scroll-gutter flex min-h-0 flex-1 flex-col gap-2 overflow-hidden p-2.5 sm:p-3">
        <!-- 월~금 그리드 — 카드 크기 안에 맞도록 overflow-hidden 유지 -->
        <div
          id="home-week-calendar"
          class="grid min-h-[7.5rem] flex-1 grid-cols-5 gap-1.5 sm:min-h-[9rem] sm:gap-2"
          role="grid"
          aria-label="월요일부터 금요일까지 주간 일정"
        ></div>
        <!--
          남는 하단 여백: 내일 일정 중 가장 빠른 1건.
          JS 가 데이터 없으면 안내문구만 표시.
        -->
        <div
          id="home-week-tomorrow"
          class="shrink-0 rounded-lg border border-gray-100 bg-gray-50/80 px-3 py-2 dark:border-gray-700 dark:bg-gray-900/30"
          aria-label="내일 첫 일정"
        ></div>
      </div>
    </section>
  </body>
</html>
