<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- [카드] 공지사항 — 최근 3건, 목록 영역만 스크롤 -->
    <section
      th:fragment="noticeCard"
      class="flex h-full min-h-0 flex-col rounded-xl border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-gray-800"
    >
      <header
        class="flex shrink-0 items-center justify-between border-b border-gray-100 px-3.5 py-2.5 dark:border-gray-700"
      >
        <h2 class="text-sm font-semibold text-gray-800 dark:text-white">
          공지사항
        </h2>
        <span class="text-xs text-gray-500 dark:text-gray-400">최근 3건</span>
      </header>
      <ul
        class="min-h-0 flex-1 space-y-1.5 overflow-y-auto px-3 py-2.5 text-sm"
        id="home-notice-list"
        aria-label="공지사항 목록"
      ></ul>
    </section>
  </body>
</html>
