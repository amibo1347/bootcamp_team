<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!--
      [플로팅 채팅] FAB + 패널 / z-index 최상단
      - 가로: 뷰포트 기준 기존 쪽지함과 동일 비율. 목록·스레드 영역은 min-h-0 + overflow로 스크롤.
      - 화면: 목록(screen-list) | 스레드(screen-thread) | 직원 선택(screen-pick)
    -->
    <div th:fragment="floatingChat">
      <!-- [채팅] 백드롭: 패널 외부 클릭 시 닫기 -->
      <div
        id="home-chat-backdrop"
        class="fixed inset-0 z-[10050] hidden bg-gray-900/45 backdrop-blur-[2px]"
        aria-hidden="true"
      ></div>

      <!-- [채팅] FAB 스택: 패널 + 플로팅 버튼 -->
      <div
        id="home-chat-stack"
        class="pointer-events-none fixed bottom-6 right-6 z-[10080] flex w-[min(calc((100vw-2rem)*0.75),19.5rem)] flex-col items-end gap-3 sm:bottom-8 sm:right-8 sm:w-[min(calc((100vw-3rem)*0.75),24rem)] lg:w-[min(calc((100vw-3rem)*0.75),27rem)]"
      >
        <!-- [채팅] 패널 본체 -->
        <div
          id="home-chat-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="home-chat-title"
          class="pointer-events-auto hidden flex max-h-[min(85vh,32rem)] w-full flex-col overflow-hidden rounded-xl border border-gray-200 bg-white shadow-2xl ring-1 ring-black/5 dark:border-gray-600 dark:bg-gray-900 dark:ring-white/10"
        >
          <!-- [채팅] 헤더: 뒤로(목록 외) | 제목·배지 | 닫기 -->
          <header
            class="flex shrink-0 items-center gap-2.5 bg-brand-600 px-2 py-3 text-white dark:bg-brand-700 sm:gap-3 sm:px-4 sm:py-3.5"
          >
            <button
              type="button"
              id="home-chat-back"
              class="hidden flex h-9 w-9 shrink-0 items-center justify-center rounded-lg text-white/90 hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/40 sm:h-10 sm:w-10 sm:rounded-xl"
              aria-label="뒤로"
            >
              <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6" />
              </svg>
            </button>
            <div class="min-w-0 flex-1 text-center">
              <h2 id="home-chat-title" class="inline text-sm font-semibold tracking-tight sm:text-base">채팅</h2>
              <span
                id="home-chat-badge"
                class="ml-1.5 inline-flex min-w-[1.25rem] items-center justify-center rounded-full bg-white/20 px-1.5 py-0.5 text-xs font-bold tabular-nums sm:ml-2 sm:min-w-[1.5rem] sm:px-2 sm:text-sm"
                >0</span
              >
            </div>
            <button
              type="button"
              id="home-chat-close"
              class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg text-white/90 hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/40 sm:h-10 sm:w-10 sm:rounded-xl"
              aria-label="닫기"
            >
              <svg class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" d="M6 6l12 12M18 6L6 18" />
              </svg>
            </button>
          </header>

          <!-- [채팅] 콘텐츠: 3화면 — flex 수축(min-h-0)으로 푸터와 겹치지 않게 높이 분배 -->
          <div class="flex min-h-0 flex-1 flex-col">
            <!-- [화면] 대화 목록 + 우하단 새 대화(+) -->
            <div id="home-chat-screen-list" class="flex min-h-0 flex-1 flex-col">
              <div class="relative flex min-h-0 flex-1 flex-col">
                <div
                  id="home-chat-list"
                  class="max-h-[min(50vh,22rem)] min-h-0 flex-1 overflow-y-auto pb-14 dark:divide-gray-700 sm:max-h-[min(55vh,26rem)]"
                  aria-label="대화 목록"
                ></div>
                <button
                  type="button"
                  id="home-chat-new"
                  class="absolute bottom-3 right-3 flex h-11 w-11 items-center justify-center rounded-full bg-brand-600 text-lg font-bold leading-none text-white shadow-lg ring-2 ring-white/30 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-300 dark:ring-gray-800/50 sm:bottom-4 sm:right-4 sm:h-12 sm:w-12"
                  aria-label="새 대화"
                >
                  +
                </button>
              </div>
            </div>

            <!-- [화면] 메시지 스레드: 세로 flex로 메시지(스크롤) + 입력(고정) — 겹침 방지 -->
            <div id="home-chat-screen-thread" class="hidden min-h-0 flex flex-1 flex-col">
              <div
                id="home-chat-messages"
                class="min-h-0 flex-1 overflow-y-auto bg-white px-3 py-3 dark:bg-gray-900 sm:px-4 sm:py-4"
                aria-live="polite"
                aria-label="대화 메시지"
              ></div>
              <!-- [채팅] 푸터: 스레드 화면 하단에만 배치(JS로 hidden 토글) — 스크롤 영역 위에 고정되어 마지막 말풍선이 가려지지 않음 -->
              <footer
                id="home-chat-footer"
                class="hidden shrink-0 border-t border-gray-100 bg-white p-2.5 dark:border-gray-700 dark:bg-gray-900 sm:p-3"
              >
                <div class="flex items-center gap-2 sm:gap-2.5">
                  <input
                    type="text"
                    id="home-chat-input"
                    class="min-w-0 flex-1 rounded-full border border-gray-200 bg-white px-3 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-200 dark:border-gray-600 dark:bg-gray-900 dark:text-white dark:focus:ring-brand-900 sm:px-4"
                    placeholder="메시지 입력..."
                    autocomplete="off"
                  />
                  <button
                    type="button"
                    id="home-chat-send"
                    class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-brand-600 text-white shadow-md hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2 dark:focus:ring-offset-gray-900 sm:h-11 sm:w-11"
                    aria-label="전송"
                  >
                    <svg class="h-4 w-4 sm:h-[1.125rem] sm:w-[1.125rem]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14m-4-4l4 4-4 4" />
                    </svg>
                  </button>
                </div>
              </footer>
            </div>

            <!-- [화면] 직원 선택 -->
            <div id="home-chat-screen-pick" class="hidden min-h-0 flex flex-1 flex-col">
              <p class="shrink-0 px-4 pt-3 text-sm text-gray-500 dark:text-gray-400 sm:px-5 sm:pt-4">직원을 선택하세요.</p>
              <div
                id="home-chat-pick-list"
                class="max-h-[min(46vh,20rem)] min-h-0 flex-1 divide-y divide-gray-100 overflow-y-auto dark:divide-gray-700 sm:max-h-[min(50vh,22rem)]"
                aria-label="직원 목록"
              ></div>
            </div>
          </div>
        </div>

        <!-- [채팅] FAB -->
        <button
          type="button"
          id="home-chat-fab"
          class="pointer-events-auto flex h-14 w-14 items-center justify-center rounded-full bg-brand-600 text-white shadow-lg ring-2 ring-white/40 transition hover:bg-brand-700 focus:outline-none focus:ring-4 focus:ring-brand-300 dark:ring-gray-900/50 dark:focus:ring-brand-900 sm:h-16 sm:w-16"
          aria-haspopup="dialog"
          aria-controls="home-chat-panel"
          aria-expanded="false"
          title="채팅"
        >
          <span class="sr-only">채팅 열기</span>
          <svg class="h-7 w-7 sm:h-8 sm:w-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>
