<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  <title>Sign In | TailAdmin</title>
  <style>
    /* [레이아웃 리셋] : 프레임워크 기본 컨테이너 여백/크기 제약 해제 */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    /* [입력 필드 공통] : 플레이스홀더 흐리게, focus 시 파란색 ring */
    input::placeholder {
      color: #9ca3af;
      opacity: 0.85;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* [로그인 카드 - 정사각형 레이아웃] : 30vw 고정 정사각형, 최소 360px 보장, 강한 그림자, 매우 둥근 모서리 */
    .login-card {
      width: 35vw !important;
      aspect-ratio: 1 / 1 !important;
      min-width: 360px;
      box-sizing: border-box;
      background-color: #ffffff;
      border-radius: 3rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .dark .login-card {
      background-color: #1d2939;
    }
  </style>
</head>

<body x-data="{ 'loaded': true, 'darkMode': false }" x-init="
      darkMode = JSON.parse(localStorage.getItem('darkMode'));
      $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'dark bg-gray-900': darkMode === true}" style="margin: 0; padding: 0">
  <div th:replace="~{partials/preloader}"></div>

  <!-- 최상위 컨테이너: 화면 전체 사용, 카드 정중앙 배치 -->
  <div
      class="flex min-h-screen w-full items-center justify-center bg-gray-300 dark:bg-gray-900">
    <!-- [로그인 카드 - 정사각형 레이아웃] : 크기/스타일은 .login-card 클래스로 일원화 -->
    <div class="login-card bg-white">
      <!-- 회사 로고 + 회사명: 어느 회사 로그인 페이지인지 확인용 -->
      <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem">
        <img th:if="${logoPath != null}" th:src="${logoPath}" alt="회사 로고"
             style="max-width: 160px; max-height: 64px; object-fit: contain;" />
        <h1 th:if="${companyName != null}" th:text="${companyName}"
            style="font-size: 1.25rem; font-weight: 700; color: #374151; margin: 0;">회사명</h1>
      </div>
      <!-- 동시 로그인으로 기존 세션이 종료된 경우 안내 (다른 곳에서 같은 계정 로그인) -->
      <div th:if="${param.expired != null}"
     class="flex items-center p-4 mb-6 text-sm border-2 rounded-2xl shadow-sm text-amber-900 border-amber-200 bg-amber-50"
     role="alert">
    <svg class="flex-shrink-0 w-5 h-5 mr-3 text-amber-600" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
    </svg>
    <div>
        <span class="font-black">세션 종료 안내</span>
        <p class="font-medium">다른 곳에서 동일한 계정으로 로그인되어 현재 기기의 세션이 종료되었습니다. 다시 로그인해 주세요.</p>
    </div>
</div>
      <!-------------------- 바꿨음 -->
      <div th:if="${errorMessage != null}"
     class="flex items-center p-4 mb-6 text-sm border-2 rounded-2xl shadow-sm duration-300 transition-colors"
     th:classappend="${
        errorMessage.contains('탈퇴') ? 'text-gray-700 border-gray-200 bg-gray-100' : 
        (errorMessage.contains('승인') or errorMessage.contains('반려') ? 'text-amber-900 border-amber-200 bg-amber-50' : 'text-red-900 border-red-200 bg-red-100/80')
     }"
     role="alert">

    <svg class="flex-shrink-0 w-5 h-5 mr-3"
         th:classappend="${
            errorMessage.contains('탈퇴') ? 'text-gray-500' : 
            (errorMessage.contains('승인') or errorMessage.contains('반려') ? 'text-amber-600' : 'text-red-600')
         }" 
         fill="currentColor" viewBox="0 0 20 20">
        
        <path th:if="${!errorMessage.contains('승인') and !errorMessage.contains('반려') and !errorMessage.contains('탈퇴')}"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v4a1 1 0 102 0V7zm-1 8a1 1 0 100-2 1 1 0 000 2z"></path>
        
        <path th:if="${errorMessage.contains('승인') or errorMessage.contains('반려') or errorMessage.contains('탈퇴')}" 
              fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
    </svg>

    <div>
        <span class="font-black" 
              th:text="${
                errorMessage.contains('탈퇴') ? '사용 중지된 계정' : 
                (errorMessage.contains('승인') or errorMessage.contains('반려') ? '접속 제한 안내' : '로그인 실패')
              }">
        </span>
        <p class="font-medium" th:text="${errorMessage}"></p>
    </div>
</div>
<div class="flex justify-end">
        <button
            class="hover:text-dark-900 relative flex h-11 w-11 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-300 dark:hover:bg-gray-800 dark:hover:text-white"
            @click.prevent="darkMode = !darkMode">
            <svg class="hidden dark:block" width="20" height="20" viewBox="0 0 20 20" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M9.99998 1.5415C10.4142 1.5415 10.75 1.87729 10.75 2.2915V3.5415C10.75 3.95572 10.4142 4.2915 9.99998 4.2915C9.58577 4.2915 9.24998 3.95572 9.24998 3.5415V2.2915C9.24998 1.87729 9.58577 1.5415 9.99998 1.5415ZM10.0009 6.79327C8.22978 6.79327 6.79402 8.22904 6.79402 10.0001C6.79402 11.7712 8.22978 13.207 10.0009 13.207C11.772 13.207 13.2078 11.7712 13.2078 10.0001C13.2078 8.22904 11.772 6.79327 10.0009 6.79327ZM5.29402 10.0001C5.29402 7.40061 7.40135 5.29327 10.0009 5.29327C12.6004 5.29327 14.7078 7.40061 14.7078 10.0001C14.7078 12.5997 12.6004 14.707 10.0009 14.707C7.40135 14.707 5.29402 12.5997 5.29402 10.0001ZM15.9813 5.08035C16.2742 4.78746 16.2742 4.31258 15.9813 4.01969C15.6884 3.7268 15.2135 3.7268 14.9207 4.01969L14.0368 4.90357C13.7439 5.19647 13.7439 5.67134 14.0368 5.96423C14.3297 6.25713 14.8045 6.25713 15.0974 5.96423L15.9813 5.08035ZM18.4577 10.0001C18.4577 10.4143 18.1219 10.7501 17.7077 10.7501H16.4577C16.0435 10.7501 15.7077 10.4143 15.7077 10.0001C15.7077 9.58592 16.0435 9.25013 16.4577 9.25013H17.7077C18.1219 9.25013 18.4577 9.58592 18.4577 10.0001ZM14.9207 15.9806C15.2135 16.2735 15.6884 16.2735 15.9813 15.9806C16.2742 15.6877 16.2742 15.2128 15.9813 14.9199L15.0974 14.036C14.8045 13.7431 14.3297 13.7431 14.0368 14.036C13.7439 14.3289 13.7439 14.8038 14.0368 15.0967L14.9207 15.9806ZM9.99998 15.7088C10.4142 15.7088 10.75 16.0445 10.75 16.4588V17.7088C10.75 18.123 10.4142 18.4588 9.99998 18.4588C9.58577 18.4588 9.24998 18.123 9.24998 17.7088V16.4588C9.24998 16.0445 9.58577 15.7088 9.99998 15.7088ZM5.96356 15.0972C6.25646 14.8043 6.25646 14.3295 5.96356 14.0366C5.67067 13.7437 5.1958 13.7437 4.9029 14.0366L4.01902 14.9204C3.72613 15.2133 3.72613 15.6882 4.01902 15.9811C4.31191 16.274 4.78679 16.274 5.07968 15.9811L5.96356 15.0972ZM4.29224 10.0001C4.29224 10.4143 3.95645 10.7501 3.54224 10.7501H2.29224C1.87802 10.7501 1.54224 10.4143 1.54224 10.0001C1.54224 9.58592 1.87802 9.25013 2.29224 9.25013H3.54224C3.95645 9.25013 4.29224 9.58592 4.29224 10.0001ZM4.9029 5.9637C5.1958 6.25659 5.67067 6.25659 5.96356 5.9637C6.25646 5.6708 6.25646 5.19593 5.96356 4.90303L5.07968 4.01915C4.78679 3.72626 4.31191 3.72626 4.01902 4.01915C3.72613 4.31204 3.72613 4.78692 4.01902 5.07981L4.9029 5.9637Z"
                fill="currentColor" />
            </svg>
            <svg class="dark:hidden" width="20" height="20" viewBox="0 0 20 20" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <path
                d="M17.4547 11.97L18.1799 12.1611C18.265 11.8383 18.1265 11.4982 17.8401 11.3266C17.5538 11.1551 17.1885 11.1934 16.944 11.4207L17.4547 11.97ZM8.0306 2.5459L8.57989 3.05657C8.80718 2.81209 8.84554 2.44682 8.67398 2.16046C8.50243 1.8741 8.16227 1.73559 7.83948 1.82066L8.0306 2.5459ZM12.9154 13.0035C9.64678 13.0035 6.99707 10.3538 6.99707 7.08524H5.49707C5.49707 11.1823 8.81835 14.5035 12.9154 14.5035V13.0035ZM16.944 11.4207C15.8869 12.4035 14.4721 13.0035 12.9154 13.0035V14.5035C14.8657 14.5035 16.6418 13.7499 17.9654 12.5193L16.944 11.4207ZM16.7295 11.7789C15.9437 14.7607 13.2277 16.9586 10.0003 16.9586V18.4586C13.9257 18.4586 17.2249 15.7853 18.1799 12.1611L16.7295 11.7789ZM10.0003 16.9586C6.15734 16.9586 3.04199 13.8433 3.04199 10.0003H1.54199C1.54199 14.6717 5.32892 18.4586 10.0003 18.4586V16.9586ZM3.04199 10.0003C3.04199 6.77289 5.23988 4.05695 8.22173 3.27114L7.83948 1.82066C4.21532 2.77574 1.54199 6.07486 1.54199 10.0003H3.04199ZM6.99707 7.08524C6.99707 5.52854 7.5971 4.11366 8.57989 3.05657L7.48132 2.03522C6.25073 3.35885 5.49707 5.13487 5.49707 7.08524H6.99707Z"
                fill="currentColor" />
            </svg>
          </button>
      </div>
      <form method="post" th:action="@{/{companyDomain}/login(companyDomain=${companyDomain})}">
        <!-- 회사 식별자: 인증(companyId) / 실패 시 되돌릴 페이지(companyDomain) -->
        <input type="hidden" name="companyId" th:value="${companyId}" />
        <input type="hidden" name="companyDomain" th:value="${companyDomain}" />
        <div style="display: flex; flex-direction: column; gap: 0.75rem">
          <!-- 아이디/사번 입력 필드: 테두리 없이 연한 회색 배경 -->
          <div>
            <label style="
                  display: block;
                  font-size: 0.875rem;
                  font-weight: 500;
                  color: #374151;
                  margin-bottom: 0.375rem;
                "
                th:text="${usesEmployeeNo} ? '사번' : '아이디'">
              아이디
            </label>
            <input type="text" name="loginId"
              placeholder="아이디를 입력하세요"
              th:placeholder="${usesEmployeeNo} ? '사번을 입력하세요' : '아이디를 입력하세요'" style="
                  width: 100%;
                  height: 3rem;
                  border: none;
                  background-color: #f3f4f6;
                  border-radius: 0.75rem;
                  padding: 0 1rem;
                  font-size: 0.875rem;
                  color: #1f2937;
                  box-sizing: border-box;
                " />
          </div>

          <!-- 비밀번호 입력 필드: 테두리 없이 연한 회색 배경, 토글 버튼 -->
          <div>
            <label style="
                  display: block;
                  font-size: 0.875rem;
                  font-weight: 500;
                  color: #374151;
                  margin-bottom: 0.375rem;
                ">
              비밀번호
            </label>
            <div x-data="{ showPassword: false }" style="position: relative">
              <input :type="showPassword ? 'text' : 'password'" name="password" placeholder="비밀번호를 입력하세요" style="
                    width: 100%;
                    height: 3rem;
                    border: none;
                    background-color: #f3f4f6;
                    border-radius: 0.75rem;
                    padding: 0 2.75rem 0 1rem;
                    font-size: 0.875rem;
                    color: #1f2937;
                    box-sizing: border-box;
                  " />
              <!-- 비밀번호 표시/숨기기 토글 -->
              <span @click="showPassword = !showPassword" style="
                    position: absolute;
                    right: 1rem;
                    top: 50%;
                    transform: translateY(-50%);
                    cursor: pointer;
                    color: #6b7280;
                  ">
                <svg x-show="!showPassword" class="fill-current" width="20" height="20" viewBox="0 0 20 20" fill="none"
                  xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M10.0002 13.8619C7.23361 13.8619 4.86803 12.1372 3.92328 9.70241C4.86804 7.26761 7.23361 5.54297 10.0002 5.54297C12.7667 5.54297 15.1323 7.26762 16.0771 9.70243C15.1323 12.1372 12.7667 13.8619 10.0002 13.8619ZM10.0002 4.04297C6.48191 4.04297 3.49489 6.30917 2.4155 9.4593C2.3615 9.61687 2.3615 9.78794 2.41549 9.94552C3.49488 13.0957 6.48191 15.3619 10.0002 15.3619C13.5184 15.3619 16.5055 13.0957 17.5849 9.94555C17.6389 9.78797 17.6389 9.6169 17.5849 9.45932C16.5055 6.30919 13.5184 4.04297 10.0002 4.04297ZM9.99151 7.84413C8.96527 7.84413 8.13333 8.67606 8.13333 9.70231C8.13333 10.7286 8.96527 11.5605 9.99151 11.5605H10.0064C11.0326 11.5605 11.8646 10.7286 11.8646 9.70231C11.8646 8.67606 11.0326 7.84413 10.0064 7.84413H9.99151Z"
                    fill="#98A2B3" />
                </svg>
                <svg x-show="showPassword" class="fill-current" width="20" height="20" viewBox="0 0 20 20" fill="none"
                  xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M4.63803 3.57709C4.34513 3.2842 3.87026 3.2842 3.57737 3.57709C3.28447 3.86999 3.28447 4.34486 3.57737 4.63775L4.85323 5.91362C3.74609 6.84199 2.89363 8.06395 2.4155 9.45936C2.3615 9.61694 2.3615 9.78801 2.41549 9.94558C3.49488 13.0957 6.48191 15.3619 10.0002 15.3619C11.255 15.3619 12.4422 15.0737 13.4994 14.5598L15.3625 16.4229C15.6554 16.7158 16.1302 16.7158 16.4231 16.4229C16.716 16.13 16.716 15.6551 16.4231 15.3622L4.63803 3.57709ZM12.3608 13.4212L10.4475 11.5079C10.3061 11.5423 10.1584 11.5606 10.0064 11.5606H9.99151C8.96527 11.5606 8.13333 10.7286 8.13333 9.70237C8.13333 9.5461 8.15262 9.39434 8.18895 9.24933L5.91885 6.97923C5.03505 7.69015 4.34057 8.62704 3.92328 9.70247C4.86803 12.1373 7.23361 13.8619 10.0002 13.8619C10.8326 13.8619 11.6287 13.7058 12.3608 13.4212ZM16.0771 9.70249C15.7843 10.4569 15.3552 11.1432 14.8199 11.7311L15.8813 12.7925C16.6329 11.9813 17.2187 11.0143 17.5849 9.94561C17.6389 9.78803 17.6389 9.61696 17.5849 9.45938C16.5055 6.30925 13.5184 4.04303 10.0002 4.04303C9.13525 4.04303 8.30244 4.17999 7.52218 4.43338L8.75139 5.66259C9.1556 5.58413 9.57311 5.54303 10.0002 5.54303C12.7667 5.54303 15.1323 7.26768 16.0771 9.70249Z"
                    fill="#98A2B3" />
                </svg>
              </span>
            </div>
          </div>

          <!-- 아이디 찾기 링크: 비밀번호 입력창 바로 아래 밀착, 오른쪽 정렬 -->
          <div style="margin-top: 0.125rem; text-align: right">
            <a href="/reset-password" style="
                  font-size: 0.75rem;
                  color: #3b82f6;
                  text-decoration: underline;
                ">
              아이디를 잃어버리셨습니까?
            </a>
          </div>

          <!-- 버튼 영역: 로그인(블루그레이)과 회원가입(outline) 가로 1:1 배치 -->
          <div style="display: flex; gap: 0.75rem; margin-top: 1rem">
            <!-- 로그인 버튼: 연한 블루그레이 강조 -->
            <button type="submit" style="
                  flex: 1;
                  height: 3rem;
                  border: none;
                  border-radius: 0.75rem;
                  background-color: #a6b2c9;
                  color: #ffffff;
                  font-size: 0.875rem;
                  font-weight: 600;
                  cursor: pointer;
                  transition: background-color 0.2s;
                " onmouseover="this.style.backgroundColor='#8f9db5'" onmouseout="this.style.backgroundColor='#A6B2C9'">
              로그인
            </button>
            <!-- 회원가입 버튼: outline 스타일 -->
            <a href="javascript:void(0)" id="btn-show-modal" style="
    flex: 1;
    height: 3rem;
    display: flex;
                  align-items: center;
                  justify-content: center;
                  border: 1.5px solid #9ca3af;
                  border-radius: 0.75rem;
                  background-color: transparent;
                  color: #6b7280;
                  font-size: 0.875rem;
                  font-weight: 500;
                  text-decoration: none;
                  transition:
                    border-color 0.2s,
                    color 0.2s;
                " onmouseover="this.style.borderColor='#A6B2C9'; this.style.color='#A6B2C9'"
              onmouseout="this.style.borderColor='#9CA3AF'; this.style.color='#6B7280'">
              회원가입
            </a>



          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="code-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; padding:2rem; border-radius:1rem; width:300px; text-align:center;">
      <h3 style="margin-bottom:1rem; font-weight:600;">기업 코드 인증</h3>
      <input type="text" id="access-code" placeholder="코드를 입력하세요"
        style="width:100%; padding:0.5rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:0.5rem;">
      <div style="display:flex; gap:0.5rem;">
        <button id="btn-code-cancel" style="flex:1; padding:0.5rem; background:#eee; border-radius:0.5rem;">취소</button>
        <button id="btn-code-confirm"
          style="flex:1; padding:0.5rem; background:#A6B2C9; color:white; border-radius:0.5rem;">확인</button>
      </div>
    </div>
  </div>

  <script src="/js/common/api-error.js"></script>
  <script type="module" src="/js/index.js"></script>
  <script src="/js/member/login.js"></script>
</body>

</html>
