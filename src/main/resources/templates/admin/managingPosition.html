<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- csrf 다시 넣었음... -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title>
        Managing Positions
    </title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
    <style>
        /* 삭제 버튼 호버 색상을 고정한다(Tailwind 빌드 여부와 무관하게 적용) */
        .btn-delete-hover:hover {
            background-color: #fda4af;
        }
    </style>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="page-content">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->

            <main class="page-main">
                <h2 class="page-heading">직급 관리</h2>

                <!-- 직급 추가 생성 — 목록보다 한 단계 작은 톤( managingDept 와 동일 ) -->
                <section
                    class="flex flex-wrap items-center gap-4 rounded-xl border border-stroke bg-white p-6 shadow-sm dark:border-strokedark dark:bg-boxdark sm:gap-6">
                    <h2 class="shrink-0 text-lg font-semibold text-gray-900 dark:text-white">직급 추가 생성</h2>

                    <div class="hidden h-8 w-px shrink-0 bg-gray-200 sm:block dark:bg-strokedark"></div>

                    <div class="flex min-w-0 flex-1 flex-wrap items-center gap-2 sm:gap-3">
                        <input type="text" placeholder="직급명" id="positionNameInput"
                            class="h-10 w-48 shrink-0 rounded-lg border border-gray-400 bg-white px-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-indigo-300 dark:border-gray-600 dark:bg-meta-4 dark:text-white dark:placeholder:text-gray-300">

                        <div class="flex shrink-0 items-center gap-2">
                            <label for="positionLevelInput"
                                class="text-sm text-gray-700 dark:text-gray-300">레벨</label>
                            <input type="number" id="positionLevelInput" min="0" placeholder="0"
                                class="h-10 w-14 rounded-lg border border-gray-400 bg-white px-2 text-center text-sm text-gray-900 outline-none transition-all focus:ring-2 focus:ring-indigo-300 dark:border-gray-600 dark:bg-meta-4 dark:text-white">
                        </div>

                        <button type="button"
                            class="shrink-0 rounded-lg bg-indigo-400 px-5 py-2 text-sm font-medium text-white shadow-sm transition-all hover:bg-indigo-500 active:scale-[0.98]"
                            th:attr="onclick=|createPosition('${companyId}')|">
                            생성
                        </button>
                    </div>
                </section>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <h2 class="mb-6 text-xl font-semibold text-black dark:text-white">기존 직급 목록</h2>

                    <!-- 목록 높이 = 행 개수만큼만 (min-h·하단 flex-1 제거 → 하단 테두리·구분선이 마지막 행에 맞춤) -->
                    <div class="overflow-hidden rounded-xl border border-gray-400 dark:border-gray-700">
                        <div id="positionListContainer">
                            <th:block th:fragment="positionListContainer">

                                <!-- 목록 행·이름·버튼: managingDept 와 동일 / 레벨·뱃지는 text-xs·text-sm 유지 -->
                                <div th:each="pos : ${positions}" th:id="'pos-row-' + ${pos.positionId}"
                                    class="flex items-center border-b border-gray-400 px-5 py-3.5 transition-colors last:border-b-0 hover:bg-gray-50 dark:border-gray-700 dark:hover:bg-white/5">

                                    <div class="ml-4 w-80 shrink-0">
                                        <span th:id="'pos-name-text-' + ${pos.positionId}"
                                            class="text-base font-medium text-gray-900 md:text-[17px] dark:text-white" th:text="${pos.positionName}"
                                            th:attr="data-is-admin=${pos.isAdmin}"></span>
                                        <input type="text" th:id="'pos-name-input-' + ${pos.positionId}"
                                            th:value="${pos.positionName}"
                                            class="hidden w-64 rounded-lg border-2 border-indigo-300 py-0.5 text-base font-medium text-gray-900 focus:border-indigo-500 focus:outline-none md:text-[17px] dark:border-indigo-500/50 dark:bg-meta-4 dark:text-white">
                                    </div>

                                    <div class="flex w-40 shrink-0 items-center justify-center space-x-2">
                                        <span class="text-xs font-medium text-gray-400 dark:text-gray-300">레벨</span>
                                        <div class="flex items-center">
                                            <span th:id="'pos-level-text-' + ${pos.positionId}"
                                                class="text-sm font-medium text-gray-700 dark:text-gray-300" th:text="${pos.positionLevel}"></span>
                                            <input type="number" th:id="'pos-level-input-' + ${pos.positionId}"
                                                th:value="${pos.positionLevel}" min="0"
                                                class="hidden h-8 w-16 rounded-lg border-2 border-indigo-300 px-2 text-center text-sm font-medium">
                                        </div>
                                    </div>

                                    <!--
                                        직급 종류 뱃지 (3분기).
                                        ※ ADMIN(대표) → "회사 관리자" — 회사 가입 시 자동 부여, 일반 직급 CRUD 와 분리.
                                        ※ SUB_ADMIN → "관리자" — 권한 관리 페이지에서 권한 부여 시 자동 전환.
                                        ※ USER → "일반".
                                    -->
                                    <div class="w-32 flex justify-center items-center flex-shrink-0">
                                        <span th:if="${pos.isCompanyAdmin}"
                                            class="rounded-full bg-amber-50 px-2.5 py-0.5 text-xs font-medium text-amber-700 dark:bg-amber-500/15 dark:text-amber-300">
                                            회사 관리자
                                        </span>
                                        <span th:if="${!pos.isCompanyAdmin and pos.isAdmin}"
                                            class="rounded-full bg-indigo-50 px-2.5 py-0.5 text-xs font-medium text-indigo-700 dark:bg-indigo-500/15 dark:text-indigo-300">
                                            관리자
                                        </span>
                                        <span th:if="${!pos.isCompanyAdmin and !pos.isAdmin}"
                                            class="rounded-full bg-gray-100 px-2.5 py-0.5 text-xs font-medium text-gray-500 dark:bg-gray-700 dark:text-gray-300">
                                            일반
                                        </span>
                                    </div>

                                    <div class="mr-4 flex flex-1 items-center justify-end gap-2">
                                        <div class="relative">
                                            <span aria-hidden="true"
                                                class="invisible block whitespace-nowrap rounded-xl px-6 py-2 text-sm font-medium shadow-sm">수정</span>
                                            <button type="button" th:id="'btn-edit-' + ${pos.positionId}"
                                                class="absolute inset-0 whitespace-nowrap rounded-xl bg-indigo-200 px-6 py-2 text-sm font-medium text-indigo-700 shadow-sm transition-all hover:bg-indigo-300"
                                                th:attr="onclick=|toggleEditMode('${pos.positionId}', true)|">수정</button>
                                            <button type="button" th:id="'btn-save-' + ${pos.positionId}"
                                                class="absolute inset-0 hidden whitespace-nowrap rounded-xl bg-indigo-200 px-6 py-2 text-sm font-medium text-indigo-700 shadow-sm transition-all hover:bg-indigo-300"
                                                th:attr="onclick=|savePosition('${pos.positionId}')|">저장</button>
                                        </div>
                                        <div class="relative">
                                            <span aria-hidden="true"
                                                class="invisible block whitespace-nowrap rounded-xl px-6 py-2 text-sm font-medium shadow-sm">삭제</span>
                                            <button type="button" th:id="'btn-delete-' + ${pos.positionId}"
                                                class="btn-delete-hover absolute inset-0 whitespace-nowrap rounded-xl bg-rose-200 px-6 py-2 text-sm font-medium text-rose-500 shadow-sm transition-all"
                                                th:attr="onclick=|deletePosition('${pos.positionId}')|">삭제</button>
                                            <button type="button" th:id="'btn-cancel-' + ${pos.positionId}"
                                                th:attr="onclick=|toggleEditMode('${pos.positionId}', false)|"
                                                class="absolute inset-0 hidden whitespace-nowrap rounded-xl bg-gray-200 px-6 py-2 text-sm font-medium text-gray-500 shadow-sm transition-all hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">
                                                취소
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div th:if="${positions == null or #lists.isEmpty(positions)}"
                                    class="p-20 text-center text-gray-400 dark:text-gray-300">등록된 직급이 없습니다.</div>
                            </th:block>
                        </div>
                    </div>
                </section>
            </main>


            <!-- ===== Main Content End ===== -->



            <!-- ===== Content Area End ===== -->
        </div>
        <!-- ===== Page Wrapper End ===== -->
        <script src="/js/admin/position.js"></script>
        <script type="module" src="/js/index.js"></script>
</body>

</html>
