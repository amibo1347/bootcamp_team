<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- csrf 다시 넣었음... -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title>
        Managing Positions
    </title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->

            <main class="p-8 space-y-8">
                <h2 class="ml-2 text-2xl font-black text-gray-900 dark:text-white">직급 관리</h2>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark flex items-center space-x-12">
                    <h2 class="flex-shrink-0 text-xl font-semibold text-gray-900 dark:text-white">직급 추가 생성</h2>

                    <div class="hidden h-10 w-px bg-gray-200 dark:bg-strokedark sm:block"></div>

                    <div class="flex items-center space-x-12 ml-2">

                        <div class="flex items-center space-x-8">
                            <input type="text" placeholder="직급명" id="positionNameInput"
                                class="h-12 w-80 rounded-lg border border-gray-400 bg-white px-4 text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-indigo-300 dark:border-gray-600 dark:bg-meta-4 dark:text-white dark:placeholder:text-gray-300">

                            <div class="flex items-center space-x-3">
                                <label for="positionLevelInput" class="text-gray-700 dark:text-gray-300">레벨</label>
                                <input type="number" id="positionLevelInput" min="0" placeholder="0"
                                    class="h-12 w-16 rounded-lg border border-gray-400 bg-white px-3 text-center text-gray-900 outline-none transition-all focus:ring-2 focus:ring-indigo-300 dark:border-gray-600 dark:bg-meta-4 dark:text-white">
                            </div>

                            <div class="flex items-center space-x-3">
                                <label for="isAdminCheck" class="text-gray-700 dark:text-gray-300">관리자</label>
                                <input type="checkbox" id="isAdminCheck"
                                    class="h-5 w-5 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                            </div>
                        </div>

                        <button type="button"
                            class="px-8 py-3 bg-indigo-400 text-white font-medium rounded-xl hover:bg-indigo-500 transition-all active:scale-95 shadow-sm flex-shrink-0"
                            th:attr="onclick=|createPosition('${companyId}')|">
                            생성
                        </button>
                    </div>
                </section>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <h2 class="mb-6 text-xl font-semibold text-black dark:text-white">기존 직급 목록</h2>

                    <div class="flex min-h-[400px] flex-col overflow-hidden rounded-xl border border-gray-400 dark:border-gray-700">
                        <div class="flex-1" id="positionListContainer">
                            <th:block th:fragment="positionListContainer">

                                <div th:each="pos : ${positions}" th:id="'pos-row-' + ${pos.positionId}"
                                    class="flex items-center border-b border-gray-400 p-5 transition-colors last:border-b-0 hover:bg-gray-50 dark:border-gray-700 dark:hover:bg-white/5 ">

                                    <div class="w-80 ml-4 flex-shrink-0">
                                        <span th:id="'pos-name-text-' + ${pos.positionId}"
                                            class="text-lg font-semibold text-gray-900 dark:text-white" th:text="${pos.positionName}"
                                            th:attr="data-is-admin=${pos.isAdmin}"></span>
                                        <input type="text" th:id="'pos-name-input-' + ${pos.positionId}"
                                            th:value="${pos.positionName}"
                                            class="hidden w-64 rounded-lg border-2 border-indigo-300 py-1 text-lg font-semibold text-gray-900 focus:border-indigo-500 focus:outline-none dark:border-indigo-500/50 dark:bg-meta-4 dark:text-white">
                                    </div>

                                    <div class="w-40 flex justify-center items-center flex-shrink-0 space-x-2">
                                        <span class="text-xs text-gray-400 dark:text-gray-300">레벨</span>
                                        <div class="flex items-center">
                                            <span th:id="'pos-level-text-' + ${pos.positionId}"
                                                class="text-base text-gray-700 dark:text-gray-300" th:text="${pos.positionLevel}"></span>
                                            <input type="number" th:id="'pos-level-input-' + ${pos.positionId}"
                                                th:value="${pos.positionLevel}" min="0"
                                                class="hidden w-16 h-9 px-2 border-2 border-indigo-300 rounded-lg text-center">
                                        </div>
                                    </div>

                                    <div class="w-32 flex justify-center items-center flex-shrink-0 space-x-2">
                                        <span class="text-xs text-gray-400 dark:text-gray-300">관리자</span> <input type="checkbox"
                                            th:id="'pos-isAdmin-' + ${pos.positionId}"
                                            class="h-5 w-5 text-indigo-600 border-gray-300 rounded"
                                            th:checked="${pos.isAdmin}" disabled>
                                    </div>

                                    <div class="flex-1 flex items-center justify-end space-x-3 mr-4">
                                        <button type="button" th:id="'btn-edit-' + ${pos.positionId}"
                                            class="px-8 py-2.5 bg-indigo-200 text-indigo-700 font-medium rounded-xl hover:bg-indigo-300 transition-all shadow-sm"
                                            th:attr="onclick=|toggleEditMode('${pos.positionId}', true)|">수정</button>
                                        <button type="button" th:id="'btn-save-' + ${pos.positionId}"
                                            class="hidden px-8 py-2.5 bg-indigo-200 text-indigo-700 font-medium rounded-xl hover:bg-indigo-300 transition-all shadow-sm"
                                            th:attr="onclick=|savePosition('${pos.positionId}')|">저장</button>
                                        <button type="button" th:id="'btn-delete-' + ${pos.positionId}"
                                            class="px-8 py-2.5 bg-rose-100 text-rose-500 font-medium rounded-xl hover:bg-rose-200 transition-all shadow-sm"
                                            th:attr="onclick=|deletePosition('${pos.positionId}')|">삭제</button>
                                        <button type="button" th:id="'btn-cancel-' + ${pos.positionId}"
                                            th:attr="onclick=|toggleEditMode('${pos.positionId}', false)|"
                                            class="hidden px-8 py-2.5 bg-gray-200 font-medium text-gray-500 rounded-xl shadow-sm transition-all hover:bg-gray-300 dark:bg-white/10 dark:text-gray-300 dark:hover:bg-white/15">
                                            취소
                                        </button>
                                    </div>
                                </div>
                                <div th:if="${positions == null or #lists.isEmpty(positions)}"
                                    class="p-20 text-center text-gray-400 dark:text-gray-300">등록된 직급이 없습니다.</div>
                            </th:block>
                        </div>
                        <div class="flex-1 bg-white dark:bg-boxdark"></div>
                    </div>
                </section>
            </main>


            <!-- ===== Main Content End ===== -->



            <!-- ===== Content Area End ===== -->
        </div>
        <!-- ===== Page Wrapper End ===== -->
        <script src="/js/admin/position.js"></script>
        <script type="module" src="/js/index.js"></script>
</body>

</html>
