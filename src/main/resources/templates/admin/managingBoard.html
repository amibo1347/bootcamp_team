<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>Managing Boards</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="darkMode = JSON.parse(localStorage.getItem('darkMode')); $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">

    <div th:replace="~{partials/preloader}"></div>

    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{partials/sidebar}"></div>

        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
            <div th:replace="~{partials/overlay}"></div>
            <div th:replace="~{partials/header}"></div>

            <main class="p-8 space-y-8">
                <h2 class="text-2xl font-black text-gray-900 ml-2 dark:text-white">게시판 관리</h2>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <h3 class="text-xl font-semibold text-black dark:text-white mb-6">게시판 생성</h3>
                    <form id="createBoardForm" class="space-y-6">
                        <input id="readScope" type="hidden" value="ALL" />
                        <input id="writeScope" type="hidden" value="ALL" />
                        <input id="commentScope" type="hidden" value="ALL" />

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-600 mb-1">게시판명</label>
                                <input id="boardName" type="text" required
                                    class="w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
                            </div>
                            <div class="relative z-20">
                                <label class="block text-sm text-gray-600 mb-1">게시판 타입</label>
                                <select id="boardType"
                                    class="relative z-20 w-full appearance-none rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                                    <option value="NOTICE">공지사항</option>
                                    <option value="POLICY">사내정책</option>
                                    <option value="FREE">자유게시판</option>
                                    <option value="QNA">Q&A 게시판</option>
                                    <option value="ANONYMOUS">익명게시판</option>
                                    <option value="ARCHIVE">보관함</option>
                                </select>
                            </div>
                            <div class="relative z-20">
                                <label class="block text-sm text-gray-600 mb-1">뷰 타입</label>
                                <select id="viewType"
                                    class="relative z-20 w-full appearance-none rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                                    <option value="LIST">목록</option>
                                    <option value="ALBUM">앨범</option>
                                    <option value="CARD">카드</option>
                                </select>
                            </div>
                        </div>

                        <button type="button" data-toggle-target="permissionSettingsPanel"
                            class="flex w-full items-center justify-between rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm font-semibold text-gray-600 hover:border-indigo-300">
                            <span>권한 설정</span>
                            <span data-toggle-arrow>▾</span>
                        </button>

                        <div id="permissionSettingsPanel" class="hidden grid grid-cols-1 gap-4">
                            <div class="rounded-xl border border-gray-200 p-4">
                                <p class="text-sm font-semibold text-gray-700 mb-3">읽기 권한</p>
                                <div class="flex items-center gap-6 text-sm mb-3">
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="readScopeOption" value="ALL" checked class="h-4 w-4" />
                                        <span>전체</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="readScopeOption" value="DEPARTMENT" class="h-4 w-4" />
                                        <span>제한</span>
                                    </label>
                                </div>
                                <div id="readLimitedOptions" class="hidden space-y-3">
                                    <div id="deptField" class="relative z-20">
                                        <label class="block text-sm text-gray-600 mb-1">부서</label>
                                        <button type="button" data-toggle-target="readDeptPanel"
                                            class="flex w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:border-indigo-300">
                                            <span>부서 선택 펼치기</span>
                                            <span data-toggle-arrow>▾</span>
                                        </button>
                                        <div id="readDeptPanel"
                                            class="mt-2 hidden max-h-36 overflow-y-auto rounded-lg border border-gray-300 bg-white p-3">
                                            <label th:each="dept : ${departments}"
                                                class="flex items-center gap-2 py-1 text-sm text-gray-700">
                                                <input type="checkbox" data-multi-group="deptId" th:value="${dept.deptId}"
                                                    class="h-4 w-4 rounded border-gray-300" />
                                                <span th:text="${dept.deptName}"></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div id="positionField" class="relative z-20">
                                        <label class="block text-sm text-gray-600 mb-1">직급</label>
                                        <button type="button" data-toggle-target="readPositionPanel"
                                            class="flex w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:border-indigo-300">
                                            <span>직급 선택 펼치기</span>
                                            <span data-toggle-arrow>▾</span>
                                        </button>
                                        <div id="readPositionPanel"
                                            class="mt-2 hidden max-h-36 overflow-y-auto rounded-lg border border-gray-300 bg-white p-3">
                                            <label th:each="pos : ${positions}"
                                                class="flex items-center gap-2 py-1 text-sm text-gray-700">
                                                <input type="checkbox" data-multi-group="positionId" th:value="${pos.positionId}"
                                                    class="h-4 w-4 rounded border-gray-300" />
                                                <span th:text="${pos.positionName}"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="rounded-xl border border-gray-200 p-4">
                                <p class="text-sm font-semibold text-gray-700 mb-3">쓰기 권한</p>
                                <div class="flex items-center gap-6 text-sm mb-3">
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="writeScopeOption" value="ALL" checked class="h-4 w-4" />
                                        <span>전체</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="writeScopeOption" value="LIMITED" class="h-4 w-4" />
                                        <span>제한</span>
                                    </label>
                                </div>
                                <div id="writeLimitedOptions" class="hidden space-y-3">
                                    <div class="relative z-20">
                                        <label class="block text-sm text-gray-600 mb-1">부서</label>
                                        <button type="button" data-toggle-target="writeDeptPanel"
                                            class="flex w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:border-indigo-300">
                                            <span>부서 선택 펼치기</span>
                                            <span data-toggle-arrow>▾</span>
                                        </button>
                                        <div id="writeDeptPanel"
                                            class="mt-2 hidden max-h-36 overflow-y-auto rounded-lg border border-gray-300 bg-white p-3">
                                            <label th:each="dept : ${departments}"
                                                class="flex items-center gap-2 py-1 text-sm text-gray-700">
                                                <input type="checkbox" data-multi-group="writeDeptId" th:value="${dept.deptId}"
                                                    class="h-4 w-4 rounded border-gray-300" />
                                                <span th:text="${dept.deptName}"></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="relative z-20">
                                        <label class="block text-sm text-gray-600 mb-1">직급</label>
                                        <button type="button" data-toggle-target="writePositionPanel"
                                            class="flex w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:border-indigo-300">
                                            <span>직급 선택 펼치기</span>
                                            <span data-toggle-arrow>▾</span>
                                        </button>
                                        <div id="writePositionPanel"
                                            class="mt-2 hidden max-h-36 overflow-y-auto rounded-lg border border-gray-300 bg-white p-3">
                                            <label th:each="pos : ${positions}"
                                                class="flex items-center gap-2 py-1 text-sm text-gray-700">
                                                <input type="checkbox" data-multi-group="writePositionId" th:value="${pos.positionId}"
                                                    class="h-4 w-4 rounded border-gray-300" />
                                                <span th:text="${pos.positionName}"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="rounded-xl border border-gray-200 p-4">
                                <p class="text-sm font-semibold text-gray-700 mb-3">댓글 권한</p>
                                <div class="flex items-center gap-6 text-sm">
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="commentScopeOption" value="ALL" checked class="h-4 w-4" />
                                        <span>전체</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="commentScopeOption" value="DEPARTMENT" class="h-4 w-4" />
                                        <span>제한</span>
                                    </label>
                                    <label class="inline-flex items-center gap-2">
                                        <input type="radio" name="commentScopeOption" value="DISABLED" class="h-4 w-4" />
                                        <span>비활성</span>
                                    </label>
                                </div>
                                <div id="commentLimitedOptions" class="hidden space-y-3 mt-3">
                                    <div class="relative z-20">
                                        <label class="block text-sm text-gray-600 mb-1">부서</label>
                                        <button type="button" data-toggle-target="commentDeptPanel"
                                            class="flex w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:border-indigo-300">
                                            <span>부서 선택 펼치기</span>
                                            <span data-toggle-arrow>▾</span>
                                        </button>
                                        <div id="commentDeptPanel"
                                            class="mt-2 hidden max-h-36 overflow-y-auto rounded-lg border border-gray-300 bg-white p-3">
                                            <label th:each="dept : ${departments}"
                                                class="flex items-center gap-2 py-1 text-sm text-gray-700">
                                                <input type="checkbox" data-multi-group="commentDeptId" th:value="${dept.deptId}"
                                                    class="h-4 w-4 rounded border-gray-300" />
                                                <span th:text="${dept.deptName}"></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="relative z-20">
                                        <label class="block text-sm text-gray-600 mb-1">직급</label>
                                        <button type="button" data-toggle-target="commentPositionPanel"
                                            class="flex w-full items-center justify-between rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 hover:border-indigo-300">
                                            <span>직급 선택 펼치기</span>
                                            <span data-toggle-arrow>▾</span>
                                        </button>
                                        <div id="commentPositionPanel"
                                            class="mt-2 hidden max-h-36 overflow-y-auto rounded-lg border border-gray-300 bg-white p-3">
                                            <label th:each="pos : ${positions}"
                                                class="flex items-center gap-2 py-1 text-sm text-gray-700">
                                                <input type="checkbox" data-multi-group="commentPositionId"
                                                    th:value="${pos.positionId}" class="h-4 w-4 rounded border-gray-300" />
                                                <span th:text="${pos.positionName}"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="button" data-toggle-target="etcSettingsPanel"
                            class="flex w-full items-center justify-between rounded-lg border border-gray-200 bg-gray-50 px-4 py-2.5 text-sm font-semibold text-gray-600 hover:border-indigo-300">
                            <span>기타 설정</span>
                            <span data-toggle-arrow>▾</span>
                        </button>

                        <div id="etcSettingsPanel" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-4 items-end">
                            <div class="relative z-20">
                                <label class="block text-sm text-gray-600 mb-1">익명 타입</label>
                                <select id="anonymousType"
                                    class="relative z-20 w-full appearance-none rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-300">
                                    <option value="NAME">실명</option>
                                    <option value="ANONYMOUS">익명</option>
                                </select>
                            </div>
                            <div class="flex items-center gap-6 pb-2">
                                <label class="inline-flex items-center gap-2">
                                    <input id="isActive" type="checkbox" checked class="h-4 w-4" />
                                    <span class="text-sm text-gray-700">활성화</span>
                                </label>
                                <label class="inline-flex items-center gap-2">
                                    <input id="isAiUse" type="checkbox" class="h-4 w-4" />
                                    <span class="text-sm text-gray-700">AI 사용</span>
                                </label>
                            </div>
                        </div>

                        <p class="text-xs text-gray-500 -mt-3">댓글 권한의 "비활성"은 현재 서버 스펙상 임시로 전체 권한으로 저장됩니다.</p>

                        <div class="pt-2">
                            <button type="submit"
                                class="rounded-xl bg-indigo-400 text-white px-8 py-3 font-medium hover:bg-indigo-500">
                                게시판 생성
                            </button>
                        </div>
                    </form>
                </section>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <h3 class="text-xl font-semibold text-black dark:text-white mb-6">게시판 목록</h3>

                    <div class="overflow-x-auto rounded-xl border border-gray-300">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50 dark:bg-meta-4">
                                <tr class="text-left">
                                    <th class="px-4 py-3">ID</th>
                                    <th class="px-4 py-3">이름</th>
                                    <th class="px-4 py-3">타입</th>
                                    <th class="px-4 py-3">활성</th>
                                    <th class="px-4 py-3">AI</th>
                                    <th class="px-4 py-3">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="board : ${boards}" class="border-t border-gray-200">
                                    <td class="px-4 py-3" th:text="${board.boardId}"></td>
                                    <td class="px-4 py-3 font-medium" th:text="${board.boardName}"></td>
                                    <td class="px-4 py-3" th:text="${board.boardType}"></td>
                                    <td class="px-4 py-3" th:text="${board.isActive ? 'Y' : 'N'}"></td>
                                    <td class="px-4 py-3" th:text="${board.isAiUse ? 'Y' : 'N'}"></td>
                                    <td class="px-4 py-3">
                                        <div class="flex items-center gap-2">
                                            <button type="button"
                                                class="rounded-lg bg-indigo-100 text-indigo-700 px-3 py-1.5 hover:bg-indigo-200"
                                                th:attr="data-board-id=${board.boardId},
                                                         data-board-name=${board.boardName},
                                                         data-board-type=${board.boardType},
                                                         data-dept-id=${board.dept != null ? board.dept.deptId : ''},
                                                         data-position-id=${board.position != null ? board.position.positionId : ''},
                                                         data-view-type=${board.viewType},
                                                         data-read-scope=${board.readScope},
                                                         data-write-scope=${board.writeScope},
                                                         data-comment-scope=${board.commentScope},
                                                         data-anonymous-type=${board.anonymousType},
                                                         data-is-active=${board.isActive},
                                                         data-is-ai-use=${board.isAiUse}"
                                                onclick="openEditModal(this)">
                                                수정
                                            </button>
                                            <button type="button"
                                                class="rounded-lg bg-rose-100 text-rose-600 px-3 py-1.5 hover:bg-rose-200"
                                                th:attr="onclick=|deleteBoard(${board.boardId})|">
                                                삭제
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${boards == null or #lists.isEmpty(boards)}">
                                    <td colspan="6" class="px-4 py-12 text-center text-gray-500">등록된 게시판이 없습니다.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-9999 hidden items-center justify-center bg-black/50">
        <div class="w-full max-w-2xl rounded-2xl bg-white p-8 shadow-xl mx-4">
            <h3 class="text-2xl font-bold mb-6">게시판 수정</h3>
            <form id="editBoardForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="editBoardId" type="hidden" />
                <div>
                    <label class="block text-sm text-gray-600 mb-1">게시판명</label>
                    <input id="editBoardName" type="text" required
                        class="w-full rounded-lg border border-gray-300 px-4 py-2.5" />
                </div>
                <div class="relative z-20">
                    <label class="block text-sm text-gray-600 mb-1">게시판 타입</label>
                    <select id="editBoardType"
                        class="relative z-20 w-full appearance-none rounded-lg border border-gray-300 bg-transparent px-4 py-2.5">
                        <option value="NOTICE">공지사항</option>
                        <option value="POLICY">사내정책</option>
                        <option value="FREE">자유게시판</option>
                        <option value="QNA">Q&A 게시판</option>
                        <option value="ANONYMOUS">익명게시판</option>
                        <option value="ARCHIVE">보관함</option>
                    </select>
                </div>
                <div class="relative z-20">
                    <label class="block text-sm text-gray-600 mb-1">부서</label>
                    <select id="editDeptId" required
                        class="relative z-20 w-full appearance-none rounded-lg border border-gray-300 bg-transparent px-4 py-2.5">
                        <option value="" disabled>부서를 선택하세요</option>
                        <option th:each="dept : ${departments}" th:value="${dept.deptId}" th:text="${dept.deptName}">
                        </option>
                    </select>
                </div>
                <div class="relative z-20">
                    <label class="block text-sm text-gray-600 mb-1">직급</label>
                    <select id="editPositionId" required
                        class="relative z-20 w-full appearance-none rounded-lg border border-gray-300 bg-transparent px-4 py-2.5">
                        <option value="" disabled>직급을 선택하세요</option>
                        <option th:each="pos : ${positions}" th:value="${pos.positionId}" th:text="${pos.positionName}">
                        </option>
                    </select>
                </div>
                <div class="flex items-center gap-6 mt-6 md:col-span-2">
                    <label class="inline-flex items-center gap-2">
                        <input id="editIsActive" type="checkbox" class="h-4 w-4" />
                        <span class="text-sm text-gray-700">활성화</span>
                    </label>
                    <label class="inline-flex items-center gap-2">
                        <input id="editIsAiUse" type="checkbox" class="h-4 w-4" />
                        <span class="text-sm text-gray-700">AI 사용</span>
                    </label>
                </div>
                <div class="md:col-span-2 mt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeEditModal()"
                        class="rounded-lg bg-gray-100 text-gray-700 px-5 py-2.5 hover:bg-gray-200">취소</button>
                    <button type="submit"
                        class="rounded-lg bg-indigo-400 text-white px-5 py-2.5 hover:bg-indigo-500">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/js/index.js"></script>
    <script src="/js/admin/board.js"></script>
</body>

</html>
