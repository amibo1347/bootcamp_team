<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- csrf 다시 넣었음... -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title>
        Managing Departure
    </title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
    <style>
        /* 삭제 버튼 호버 색상을 고정한다(Tailwind 빌드 여부와 무관하게 적용) */
        .btn-delete-hover:hover {
            background-color: #fda4af;
        }
    </style>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="page-content">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->

            <main class="page-main">
                <h2 class="page-heading">부서 관리</h2>

                <!-- 부서 추가 생성 — 목록보다 한 단계 작은 톤( managingPosition 과 동일 ) -->
                <section
                    class="flex items-center gap-4 rounded-xl border border-stroke bg-white p-6 shadow-sm dark:border-strokedark dark:bg-boxdark sm:gap-6">
                    <h2 class="shrink-0 text-lg font-semibold text-gray-900 dark:text-white">부서 추가 생성</h2>

                    <div class="hidden h-8 w-px shrink-0 bg-gray-200 sm:block dark:bg-strokedark"></div>

                    <div class="flex min-w-0 flex-1 flex-wrap items-center gap-2 sm:gap-3">
                        <input type="text" placeholder="부서명" id="deptNameInput"
                            class="h-10 w-48 shrink-0 rounded-lg border border-gray-400 bg-white px-3 text-sm text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-indigo-300 dark:border-gray-600 dark:bg-meta-4 dark:text-white dark:placeholder:text-gray-300">

                        <button type="button"
                            class="shrink-0 rounded-lg bg-indigo-400 px-5 py-2 text-sm font-medium text-white shadow-sm transition-all hover:bg-indigo-500 active:scale-[0.98]"
                            th:attr="onclick=|createDept('${companyId}')|">
                            생성
                        </button>
                    </div>
                </section>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <h2 class="mb-6 text-xl font-semibold text-black dark:text-white">기존 부서 목록</h2>

                    <!-- 목록 높이 = 행 개수만큼만 (min-h·하단 flex-1 제거 → 하단 테두리·구분선이 마지막 행에 맞춤) -->
                    <div class="overflow-hidden rounded-xl border border-gray-400 dark:border-gray-700">
                        <div id="deptListContainer">
                            <div th:each="dept : ${departments}" th:id="'dept-row-' + ${dept.deptId}"
                                class="flex items-center justify-between border-b border-gray-400 px-5 py-3.5 transition-colors last:border-b-0 hover:bg-gray-50 dark:border-gray-700 dark:hover:bg-white/5">
                                <input type="hidden" th:id="'dept-code-' + ${dept.deptId}" th:value="${dept.deptCode}">

                                <span th:id="'dept-name-text-' + ${dept.deptId}"
                                    class="ml-4 text-base font-medium text-gray-900 md:text-[17px] dark:text-white" th:text="${dept.deptName}"></span>

                                <input type="text" th:id="'dept-name-input-' + ${dept.deptId}"
                                    th:value="${dept.deptName}"
                                    class="ml-4 hidden rounded-lg border-2 border-indigo-300 py-0.5 text-base font-medium text-gray-900 focus:border-indigo-500 focus:outline-none md:text-[17px] dark:border-indigo-500/50 dark:bg-meta-4 dark:text-white">

                                <div class="mr-4 flex shrink-0 items-center gap-2">
                                    <div class="relative">
                                        <span aria-hidden="true"
                                            class="invisible block whitespace-nowrap rounded-xl px-6 py-2 text-sm font-medium shadow-sm">수정</span>
                                        <button type="button" th:id="'btn-edit-' + ${dept.deptId}"
                                            class="absolute inset-0 whitespace-nowrap rounded-xl bg-indigo-200 px-6 py-2 text-sm font-medium text-indigo-700 shadow-sm transition-all hover:bg-indigo-300"
                                            th:attr="onclick=|toggleEditMode('${dept.deptId}', true)|">
                                            수정
                                        </button>
                                        <button type="button" th:id="'btn-save-' + ${dept.deptId}"
                                            class="absolute inset-0 hidden whitespace-nowrap rounded-xl bg-indigo-200 px-6 py-2 text-sm font-medium text-indigo-700 shadow-sm transition-all hover:bg-indigo-300"
                                            th:attr="onclick=|saveDept('${dept.deptId}')|">
                                            저장
                                        </button>
                                    </div>

                                    <div class="relative">
                                        <span aria-hidden="true"
                                            class="invisible block whitespace-nowrap rounded-xl px-6 py-2 text-sm font-medium shadow-sm">삭제</span>
                                        <button type="button" th:id="'btn-delete-' + ${dept.deptId}"
                                            class="btn-delete-hover absolute inset-0 whitespace-nowrap rounded-xl bg-rose-200 px-6 py-2 text-sm font-medium text-rose-500 shadow-sm transition-all"
                                            th:attr="onclick=|deleteDept('${dept.deptId}')|">
                                            삭제
                                        </button>
                                        <button type="button" th:id="'btn-cancel-' + ${dept.deptId}"
                                            th:attr="onclick=|toggleEditMode('${dept.deptId}', false)|"
                                            class="absolute inset-0 hidden whitespace-nowrap rounded-xl bg-gray-200 px-6 py-2 text-sm font-medium text-gray-500 shadow-sm transition-all hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">
                                            취소
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${departments == null or #lists.isEmpty(departments)}"
                                class="p-20 text-center text-gray-400 dark:text-gray-300">등록된 부서가 없습니다.</div>
                        </div>
                    </div>
                </section>
            </main>


            <!-- ===== Main Content End ===== -->



            <!-- ===== Content Area End ===== -->
        </div>
        <!-- ===== Page Wrapper End ===== -->
        <script src="/js/admin/dept.js"></script>
        <script type="module" src="/js/index.js"></script>
</body>

</html>
