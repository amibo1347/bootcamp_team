<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- csrf 다시 넣었음... -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title>
        Managing Departure
    </title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
    <style>
        /* 삭제 버튼 호버 색상을 고정한다(Tailwind 빌드 여부와 무관하게 적용) */
        .btn-delete-hover:hover {
            background-color: #fda4af;
        }
    </style>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->

            <main class="p-8 space-y-8">
                <h2 class="ml-2 text-2xl font-black text-gray-900 dark:text-white">부서 관리</h2>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark flex items-center space-x-12">
                    <h2 class="flex-shrink-0 text-xl font-semibold text-gray-900 dark:text-white">부서 추가 생성</h2>

                    <div class="hidden sm:block h-10 w-[1px] bg-gray-200 dark:bg-strokedark"></div>

                    <div class="flex items-center space-x-10">
                        <input type="text" placeholder="부서명" id="deptNameInput"
                            class="h-12 w-80 rounded-lg border border-gray-400 bg-white px-4 text-gray-900 outline-none transition-all placeholder:text-gray-400 focus:ring-2 focus:ring-indigo-300 dark:border-gray-600 dark:bg-meta-4 dark:text-white dark:placeholder:text-gray-300">

                        <button type="button"
                            class="px-8 py-3 bg-indigo-400 text-white font-medium rounded-xl hover:bg-indigo-500 transition-all active:scale-95 shadow-sm flex-shrink-0"
                            th:attr="onclick=|createDept('${companyId}')|">
                            생성
                        </button>
                    </div>
                </section>

                <section
                    class="p-6 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <h2 class="mb-6 text-xl font-semibold text-black dark:text-white">기존 부서 목록</h2>

                    <div class="flex min-h-[400px] flex-col rounded-xl border border-gray-400 dark:border-gray-700">
                        <div class="flex-1" id="deptListContainer">
                            <div th:each="dept : ${departments}" th:id="'dept-row-' + ${dept.deptId}"
                                class="flex items-center justify-between border-b border-gray-400 p-5 transition-colors last:border-b-0 hover:bg-gray-50 dark:border-gray-700 dark:hover:bg-white/5">
                                <input type="hidden" th:id="'dept-code-' + ${dept.deptId}" th:value="${dept.deptCode}">

                                <span th:id="'dept-name-text-' + ${dept.deptId}"
                                    class="ml-4 text-lg font-semibold text-gray-900 dark:text-white" th:text="${dept.deptName}"></span>

                                <input type="text" th:id="'dept-name-input-' + ${dept.deptId}"
                                    th:value="${dept.deptName}"
                                    class="ml-4 hidden rounded-lg border-2 border-indigo-300 py-1 text-lg font-semibold text-gray-900 focus:border-indigo-500 focus:outline-none dark:border-indigo-500/50 dark:bg-meta-4 dark:text-white">

                                <div class="flex items-center space-x-3 mr-4">
                                    <div class="relative">
                                        <span aria-hidden="true"
                                            class="invisible block px-8 py-2.5 font-medium rounded-xl shadow-sm">수정</span>
                                        <button type="button" th:id="'btn-edit-' + ${dept.deptId}"
                                            class="absolute inset-0 px-8 py-2.5 bg-indigo-200 text-indigo-700 font-medium rounded-xl hover:bg-indigo-300 transition-all shadow-sm"
                                            th:attr="onclick=|toggleEditMode('${dept.deptId}', true)|">
                                            수정
                                        </button>
                                        <button type="button" th:id="'btn-save-' + ${dept.deptId}"
                                            class="hidden absolute inset-0 px-8 py-2.5 bg-indigo-200 text-indigo-700 font-medium rounded-xl hover:bg-indigo-300 transition-all shadow-sm"
                                            th:attr="onclick=|saveDept('${dept.deptId}')|">
                                            저장
                                        </button>
                                    </div>

                                    <div class="relative">
                                        <span aria-hidden="true"
                                            class="invisible block px-8 py-2.5 font-medium rounded-xl shadow-sm">삭제</span>
                                        <button type="button" th:id="'btn-delete-' + ${dept.deptId}"
                                            class="btn-delete-hover absolute inset-0 px-8 py-2.5 bg-rose-200 text-rose-500 font-medium rounded-xl transition-all shadow-sm"
                                            th:attr="onclick=|deleteDept('${dept.deptId}')|">
                                            삭제
                                        </button>
                                        <button type="button" th:id="'btn-cancel-' + ${dept.deptId}"
                                            th:attr="onclick=|toggleEditMode('${dept.deptId}', false)|"
                                            class="hidden absolute inset-0 px-8 py-2.5 bg-gray-200 font-medium text-gray-500 rounded-xl shadow-sm transition-all hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">
                                            취소
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${departments == null or #lists.isEmpty(departments)}"
                                class="p-20 text-center text-gray-400 dark:text-gray-300">등록된 부서가 없습니다.</div>
                        </div>
                        <div class="flex-1 bg-white dark:bg-boxdark"></div>
                    </div>
                </section>
            </main>


            <!-- ===== Main Content End ===== -->



            <!-- ===== Content Area End ===== -->
        </div>
        <!-- ===== Page Wrapper End ===== -->
        <th:block th:replace="~{partials/floating-chat :: floatingChatGlobal}"></th:block>
        <script src="/js/admin/dept.js"></script>
        <script type="module" src="/js/index.js"></script>
        <script type="module" th:src="@{/js/floating-chat.js}"></script>
</body>

</html>
