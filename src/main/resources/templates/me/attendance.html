<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>내 근무표</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
</head>

<body
    x-data="{ page: 'myAttendance', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
            darkMode = JSON.parse(localStorage.getItem('darkMode'));
            $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">

    <div th:replace="~{partials/preloader}"></div>

    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{partials/sidebar}"></div>

        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
            <div th:replace="~{partials/overlay}"></div>
            <div th:replace="~{partials/header}"></div>

            <main class="p-8 space-y-6">

                <div class="ml-2 flex items-center justify-between gap-3">
                    <h2 class="text-2xl font-black text-gray-900 dark:text-white">내 근무표</h2>
                    <span class="text-xs text-gray-400 dark:text-gray-500">
                        ※ 근무 일정 추가는
                        <a th:href="@{/calendar}" class="text-indigo-500 hover:underline">일정 조회</a>
                        에서 진행하세요.
                    </span>
                </div>

                <!-- 월 네비게이션 + 요약 -->
                <section class="p-5 border border-stroke rounded-xl bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                        <div class="flex items-center gap-3">
                            <button type="button" id="prevMonthBtn"
                                class="rounded-lg border border-gray-300 px-3 py-1.5 text-sm hover:bg-gray-50 dark:border-gray-600 dark:hover:bg-meta-4">←</button>
                            <h3 id="monthLabel" class="text-lg font-semibold text-gray-900 dark:text-white">-</h3>
                            <button type="button" id="nextMonthBtn"
                                class="rounded-lg border border-gray-300 px-3 py-1.5 text-sm hover:bg-gray-50 dark:border-gray-600 dark:hover:bg-meta-4">→</button>
                            <button type="button" id="thisMonthBtn"
                                class="ml-2 rounded-lg bg-indigo-100 px-3 py-1.5 text-sm font-medium text-indigo-700 hover:bg-indigo-200">이번 달</button>
                            <span class="ml-3 text-xs text-gray-500 dark:text-gray-400"
                                th:text="|회사 정책 — 출근 ${policy.workStart} · 퇴근 ${policy.workEnd} · 휴게 ${policy.breakMinutes}분|">정책</span>
                        </div>
                        <div class="flex gap-3 text-sm">
                            <div class="rounded-lg bg-gray-50 px-4 py-2 dark:bg-meta-4">
                                <span class="text-xs text-gray-500 dark:text-gray-400">총 실근무</span>
                                <span id="summaryActual" class="ml-2 font-semibold text-gray-900 dark:text-white">-</span>
                            </div>
                            <div class="rounded-lg bg-gray-50 px-4 py-2 dark:bg-meta-4">
                                <span class="text-xs text-gray-500 dark:text-gray-400">총 초과</span>
                                <span id="summaryOvertime" class="ml-2 font-semibold text-rose-600">-</span>
                            </div>
                            <div class="rounded-lg bg-gray-50 px-4 py-2 dark:bg-meta-4">
                                <span class="text-xs text-gray-500 dark:text-gray-400">지각</span>
                                <span id="summaryLate" class="ml-2 font-semibold text-amber-600">-</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 월 캘린더 -->
                <section class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm dark:border-gray-700 dark:bg-boxdark">
                    <!-- 요일 헤더 -->
                    <div class="grid grid-cols-7 border-b border-gray-200 bg-gray-50 text-center text-xs font-semibold dark:border-gray-700 dark:bg-meta-4">
                        <div class="px-2 py-2 text-rose-500">일</div>
                        <div class="px-2 py-2 text-gray-600 dark:text-gray-300">월</div>
                        <div class="px-2 py-2 text-gray-600 dark:text-gray-300">화</div>
                        <div class="px-2 py-2 text-gray-600 dark:text-gray-300">수</div>
                        <div class="px-2 py-2 text-gray-600 dark:text-gray-300">목</div>
                        <div class="px-2 py-2 text-gray-600 dark:text-gray-300">금</div>
                        <div class="px-2 py-2 text-sky-500">토</div>
                    </div>
                    <!-- 날짜 셀 -->
                    <div id="calendarGrid" class="grid grid-cols-7"></div>
                </section>
            </main>
        </div>
    </div>

    <script type="module" src="/js/index.js"></script>
    <script src="/js/me/attendance.js"></script>
</body>

</html>
