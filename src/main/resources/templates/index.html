<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>
      테마형 인트라넷
    </title>
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  </head>
  <!-- [레이아웃] True No-Scroll: 뷰포트 높이 고정 + 바깥 스크롤 차단 -->
  <body
    class="h-screen overflow-hidden"
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
  <!-- ===== 로딩 화면 ===== -->
  <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
  <!-- ===== 사이드바 ===== -->
  <div th:replace="~{partials/sidebar}"></div>
  <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <!-- [Strict No-Scroll] 세로 스크롤은 이 컬럼에서 발생하지 않음. flex-1 + min-h-0로 자식 flex 높이 수축 허용 -->
      <div class="relative flex min-h-0 flex-1 flex-col overflow-hidden">
  <!-- Small Device Overlay Start -->
  <div th:replace="~{partials/overlay}"></div>
  <!-- Small Device Overlay End -->

  <!-- ===== Header Start ===== -->
  <div th:replace="~{partials/header}"></div>
  <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <!-- [메인] flex-1 min-h-0: 카드 그리드가 남는 높이를 채우고 내부 overflow만 스크롤 -->
        <main class="flex min-h-0 flex-1 flex-col bg-gray-50/80 dark:bg-gray-900/40">
          <div class="flex min-h-0 flex-1 flex-col p-6 sm:p-8 lg:px-12 lg:py-10 xl:px-16 xl:py-12">
            <div th:replace="~{home/dashboard :: mainDashboard}"></div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <script type="module" th:src="@{/js/index.js}"></script>
    <script type="module" th:src="@{/js/index-home.js}"></script>
  </body>
</html>
