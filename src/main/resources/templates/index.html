<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>
      테마형 인트라넷
    </title>
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  </head>
  <!--
    [레이아웃]
    - max-lg(모바일·태블릿): 문서 전체 세로 스크롤 허용(h-auto + overflow-y-auto)
    - lg~(데스크톱): 기존 No-Scroll(h-dvh + overflow-hidden), 가로는 min-w-0·w-full로 플렉스 축소
  -->
  <body
    class="min-h-0 max-lg:min-h-dvh max-lg:overflow-y-auto max-lg:bg-gray-50 max-lg:dark:bg-gray-900 lg:h-dvh lg:overflow-hidden"
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
  <!-- ===== 로딩 화면 ===== -->
  <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <!-- [Page Wrapper] 모바일: 높이·overflow 자연스럽게 / 데스크톱: 뷰포트 고정 + 클립 -->
    <div class="flex min-h-0 w-full min-w-0 max-lg:h-auto max-lg:min-h-0 max-lg:overflow-visible lg:h-dvh lg:overflow-hidden">
  <!-- ===== 사이드바 ===== -->
  <div th:replace="~{partials/sidebar}"></div>
  <!-- ===== Sidebar End ===== -->

      <!-- [Content Area] 데스크톱: min-h-0으로 자식 flex 수축 / 모바일: 본문 높이만큼 확장·바깥 스크롤 -->
      <div class="relative flex w-full min-w-0 max-lg:h-auto max-lg:min-h-0 max-lg:flex-none max-lg:overflow-visible lg:min-h-0 lg:flex-1 lg:flex-col lg:overflow-hidden flex-col">
  <!-- Small Device Overlay Start -->
  <div th:replace="~{partials/overlay}"></div>
  <!-- Small Device Overlay End -->

  <!-- ===== Header Start ===== -->
  <div th:replace="~{partials/header}"></div>
  <!-- ===== Header End ===== -->

        <!-- [메인] 모바일: flex-1 미사용으로 콘텐츠 높이만큼만 차지 / 데스크톱: flex-1 + min-h-0 유지 -->
        <main class="flex w-full min-w-0 max-w-full max-lg:flex-none max-lg:overflow-visible bg-gray-50/80 dark:bg-gray-900/40 lg:min-h-0 lg:flex-1 lg:flex-col lg:overflow-hidden flex-col">
          <div class="flex w-full min-w-0 max-w-full max-lg:flex-none max-lg:overflow-visible lg:min-h-0 lg:flex-1 lg:flex-col lg:items-center lg:justify-center px-6 pb-6 pt-10 sm:px-8 sm:pb-8 sm:pt-12 lg:px-10 lg:pb-8 lg:pt-14 xl:px-14 xl:pb-10 xl:pt-16 flex-col items-center">
            <div th:replace="~{home/dashboard :: mainDashboard}"></div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <script type="module" th:src="@{/js/index.js}"></script>
    <script type="module" th:src="@{/js/index-home.js}"></script>
  </body>
</html>
