<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>
      테마형 인트라넷
    </title>
  <link rel="stylesheet" href="/css/output.css" />
  </head>
  <body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
  <!-- ===== 로딩 화면 ===== -->
  <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
  <!-- ===== 사이드바 ===== -->
  <div th:replace="~{partials/sidebar}"></div>
  <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
  <!-- Small Device Overlay Start -->
  <div th:replace="~{partials/overlay}"></div>
  <!-- Small Device Overlay End -->

  <!-- ===== Header Start ===== -->
  <div th:replace="~{partials/header}"></div>
  <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="relative overflow-hidden p-5 rounded-md shadow-sm bg-white dark:bg-gray-800 ring-1 ring-gray-200 dark:ring-gray-700">
            <h3 class="text-lg font-semibold mb-4">메인 콘텐츠 영역</h3>
            <p>이곳에 페이지별 주요 콘텐츠가 들어갑니다.</p>
            <div class="mt-6">
              <a href="#" class="text-blue-500 hover:underline">더 알아보기</a>
            </div>
          </div>
        </main>
        <!-- ===== Main Content End ===== -->



      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <script type="module" src="/js/index.js"></script>
  </body>
</html>
