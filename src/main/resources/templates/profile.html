<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>내 프로필 | 인트라넷</title>
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
</head>

<body
  x-data="{ page: 'profile', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false, 'isProfileInfoModal': false }"
  x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'dark bg-gray-900': darkMode === true}">
  <!-- ===== Preloader Start ===== -->
  <div th:replace="~{partials/preloader}"></div>
  <!-- ===== Preloader End ===== -->

  <!-- ===== Page Wrapper Start ===== -->
  <div class="flex h-screen overflow-hidden">
    <!-- ===== Sidebar Start ===== -->
    <div th:replace="~{partials/sidebar}"></div>
    <!-- ===== Sidebar End ===== -->

    <!-- ===== Content Area Start ===== -->
    <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
      <!-- Small Device Overlay Start -->
      <div th:replace="~{partials/overlay}"></div>
      <!-- Small Device Overlay End -->

      <!-- ===== Header Start ===== -->
      <div th:replace="~{partials/header}"></div>
      <!-- ===== Header End ===== -->

      <!-- ===== Main Content Start ===== -->
      <main>
        <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
          <!-- Breadcrumb Start -->
          <div x-data="{ pageName: `내 프로필`}">
            <div th:replace="~{partials/breadcrumb}"></div>
          </div>
          <!-- Breadcrumb End -->

          <!-- [프로필 본문] 세션(memberSession) 기반 표시. memberId 등은 화면에 노출하지 않음 -->
          <div th:if="${session != null and session.memberSession != null}" th:with="ms=${session.memberSession}"
            class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
            <h3 class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-7">
              내 프로필
            </h3>

            <!-- [프로필 요약 카드] 사진(카메라 버튼으로만 수정)·이름·직급·부서 -->
            <div class="p-5 mb-6 border border-gray-200 rounded-2xl dark:border-gray-800 lg:p-6">
              <div class="flex flex-col items-center w-full gap-6 xl:flex-row">
                <div id="profileSummaryRoot" class="relative shrink-0 overflow-visible"
                  th:attr="data-profile-img-url=@{/api/member/{id}/profileImg(id=${ms.memberId})}">
                  <div
                    class="flex h-20 w-20 items-center justify-center overflow-hidden rounded-full border border-gray-200 bg-slate-100 dark:border-gray-800">
                    <img id="profileSummaryImg" th:src="@{/api/member/{id}/profileImg(id=${ms.memberId})}"
                      th:alt="|${ms.name} 프로필 사진|" src="/images/user/defalut_user.jpg" alt="프로필 사진"
                      class="h-full w-full object-cover" />
                  </div>

                  <input type="file" id="profileImgInput" class="hidden" accept="image/*" />

                  <button type="button" onclick="document.querySelector('#profileImgInput').click()"
                    class="absolute z-10 rounded-full border border-gray-200 bg-white p-1.5 shadow-md ring-2 ring-white transition hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:ring-gray-900 dark:hover:bg-white/[0.03]"
                    style="bottom: -6px; right: -6px;" aria-label="프로필 사진 변경">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-600 dark:text-gray-300"
                      fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                  </button>
                </div>
                <div>
                  <h4 class="mb-2 text-lg font-semibold text-center text-gray-800 dark:text-white/90 xl:text-left"
                    th:text="${ms.name}">
                    이름
                  </h4>
                  <div class="flex flex-col items-center gap-1 text-center xl:flex-row xl:gap-3 xl:text-left">
                    <p th:if="${ms.positionName != null}" class="text-sm text-gray-500 dark:text-gray-300"
                      th:text="${ms.positionName}">
                      직급
                    </p>
                    <div th:if="${ms.positionName != null and ms.deptName != null}"
                      class="hidden h-3.5 w-px bg-gray-300 dark:bg-gray-700 xl:block"></div>
                    <p th:if="${ms.deptName != null}" class="text-sm text-gray-500 dark:text-gray-300"
                      th:text="${ms.deptName}">
                      부서
                    </p>
                  </div>
                </div>
              </div>
            </div>
            <!-- [프로필 요약 카드] End -->

            <!-- [개인 정보] memberSession 필드만 표시 (ID·권한·회사·내부 식별자 제외) -->
            <div class="p-5 border border-gray-200 rounded-2xl dark:border-gray-800 lg:p-6">
              <div class="flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-between">
                <div>
                  <h4 class="text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-6">
                    개인 정보
                  </h4>

                  <div class="grid grid-cols-1 gap-4 lg:grid-cols-2 lg:gap-7 2xl:gap-x-32">
                    <div>
                      <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">
                        이름
                      </p>
                      <p class="text-sm font-medium text-gray-800 dark:text-white/90" th:text="${ms.name}">
                        -
                      </p>
                    </div>

                    <div>
                      <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">
                        로그인 ID
                      </p>
                      <p class="text-sm font-medium text-gray-800 dark:text-white/90" th:text="${ms.loginId}">
                        -
                      </p>
                    </div>

                    <div>
                      <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">
                        이메일
                      </p>
                      <p class="text-sm font-medium text-gray-800 dark:text-white/90"
                        th:text="${ms.email != null ? ms.email : '-'}">
                        -
                      </p>
                    </div>

                  </div>
                </div>

                <button @click="isProfileInfoModal = true"
                  class="flex w-full items-center justify-center gap-2 rounded-full border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-700 shadow-theme-xs hover:bg-gray-50 hover:text-gray-800 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-white/[0.03] dark:hover:text-gray-200 lg:inline-flex lg:w-auto">
                  <svg class="fill-current" width="18" height="18" viewBox="0 0 18 18" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                      d="M15.0911 2.78206C14.2125 1.90338 12.7878 1.90338 11.9092 2.78206L4.57524 10.116C4.26682 10.4244 4.0547 10.8158 3.96468 11.2426L3.31231 14.3352C3.25997 14.5833 3.33653 14.841 3.51583 15.0203C3.69512 15.1996 3.95286 15.2761 4.20096 15.2238L7.29355 14.5714C7.72031 14.4814 8.11172 14.2693 8.42013 13.9609L15.7541 6.62695C16.6327 5.74827 16.6327 4.32365 15.7541 3.44497L15.0911 2.78206ZM12.9698 3.84272C13.2627 3.54982 13.7376 3.54982 14.0305 3.84272L14.6934 4.50563C14.9863 4.79852 14.9863 5.2734 14.6934 5.56629L14.044 6.21573L12.3204 4.49215L12.9698 3.84272ZM11.2597 5.55281L5.6359 11.1766C5.53309 11.2794 5.46238 11.4099 5.43238 11.5522L5.01758 13.5185L6.98394 13.1037C7.1262 13.0737 7.25666 13.003 7.35947 12.9002L12.9833 7.27639L11.2597 5.55281Z"
                      fill="" />
                  </svg>
                  수정
                </button>
              </div>
            </div>
            <!-- [개인 정보] End -->
          </div>

          <!-- [비로그인] 세션 없을 때 안내 -->
          <div th:unless="${session != null and session.memberSession != null}"
            class="rounded-2xl border border-gray-200 bg-white p-8 text-center dark:border-gray-800 dark:bg-white/[0.03]">
            <p class="text-sm text-gray-600 dark:text-gray-300">
              로그인 후 프로필을 확인할 수 있습니다.
            </p>
          </div>
        </div>
      </main>
      <!-- ===== Main Content End ===== -->
    </div>
    <!-- ===== Content Area End ===== -->
  </div>
  <!-- ===== Page Wrapper End ===== -->

  <!-- BEGIN MODAL -->
  <div th:replace="~{partials/profile/profile-info-modal}"></div>
  <!-- END MODAL -->
  <script type="module" src="/js/index.js"></script>
  <script th:src="@{/js/profile.js}"></script>
</body>

</html>
