<!-- ======================================================== -->
<!-- [내 프로필] : 사이드바/헤더 공통 레이아웃. 본문은 main(p-8) 영역 -->
<!-- ======================================================== -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>내 프로필 | 인트라넷</title>
  <link rel="stylesheet" th:href="@{/css/output.css}" />
  <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  <style>
    /*
        [개인 정보] 카드 우측 하단 비밀번호 버튼 핀 — lg(≥1024px) 화면에서만 적용.
        ※ 비번 wrapper 를 absolute 로 흐름에서 빼서 카드 세로 길이를 좌측 grid 자연 높이로 고정.
          ⇒ 좌측 "연락처/생년월일" 라인과 같은 세로 위치에 비번 버튼이 정렬되고 카드가 늘어나지 않는다.
        ※ lg 미만(모바일) 에서는 자연 흐름 (수정 버튼 아래에 mt-6 로 배치) 으로 동작.
    */
    @media (min-width: 1024px) {
      .profile-pwd-buttons-pin {
        position: absolute;
        right: 1.5rem;
        bottom: 1.5rem;
        margin-top: 0;
      }
    }
  </style>
</head>

<body
  x-data="{ page: 'profile', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
  x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'dark bg-gray-900': darkMode === true}">
  <!-- ===== Preloader Start ===== -->
  <div th:replace="~{partials/preloader}"></div>
  <!-- ===== Preloader End ===== -->

  <!-- ===== Page Wrapper Start ===== -->
  <div class="flex h-screen overflow-hidden">
    <!-- ===== Sidebar Start ===== -->
    <div th:replace="~{partials/sidebar}"></div>
    <!-- ===== Sidebar End ===== -->

    <!-- ===== Content Area Start ===== -->
    <!-- page-content: scrollbar-gutter 로 스크롤 유무와 동일 가로 폭 -->
    <div class="page-content">
      <!-- Small Device Overlay Start -->
      <div th:replace="~{partials/overlay}"></div>
      <!-- Small Device Overlay End -->

      <!-- ===== Header Start ===== -->
      <div th:replace="~{partials/header}"></div>
      <!-- ===== Header End ===== -->

      <!-- ===== Main Content Start ===== -->
      <main class="page-main">
        <!-- [페이지 제목] 캘린더·조직도 등 앱 페이지와 동일 타이포 -->
        <h2 class="page-heading">내 프로필</h2>

        <!-- [프로필 본문] 세션(memberSession) 기반 표시 -->
        <div th:if="${session != null and session.memberSession != null}" th:with="ms=${session.memberSession}"
          class="space-y-6">

            <!-- [모달 초기값] memberSession 필드로 폼 채움 -->
            <div id="profilePageData" class="hidden"
              th:attr="data-name=${ms.name},
                       data-email=${ms.email != null ? ms.email : ''},
                       data-phone=${ms.phone != null ? ms.phone : ''},
                       data-birth=${ms.birthDay != null ? #temporals.format(ms.birthDay, 'yyyy-MM-dd') : ''}"></div>

          <!-- [프로필 요약] 사진(카메라 버튼으로만 수정)·이름·직급·부서 -->
          <section
            class="rounded-xl border border-stroke bg-white p-6 shadow-sm dark:border-strokedark dark:bg-boxdark">
            <div class="flex w-full flex-col items-center gap-6 xl:flex-row">
                <div id="profileSummaryRoot" class="relative shrink-0 overflow-visible"
                  th:attr="data-profile-img-url=@{/api/member/{id}/profileImg(id=${ms.memberId})}">
                  <div
                    class="flex h-20 w-20 items-center justify-center overflow-hidden rounded-full border border-gray-200 bg-slate-100 dark:border-gray-800">
                    <img id="profileSummaryImg" th:src="@{/api/member/{id}/profileImg(id=${ms.memberId})}"
                      th:alt="|${ms.name} 프로필 사진|" src="/images/user/defalut_user.jpg" alt="프로필 사진"
                      class="h-full w-full object-cover" />
                  </div>

                  <input type="file" id="profileImgInput" class="hidden" accept="image/*" />

                  <button type="button" onclick="document.querySelector('#profileImgInput').click()"
                    class="absolute z-10 rounded-full border border-gray-200 bg-white p-1.5 shadow-md ring-2 ring-white transition hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:ring-gray-900 dark:hover:bg-white/[0.03]"
                    style="bottom: -6px; right: -6px;" aria-label="프로필 사진 변경">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-600 dark:text-gray-300"
                      fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                  </button>
                </div>
                <!-- [텍스트 블록] 이름·로그인 ID·직급·부서 -->
                <div class="flex flex-col items-center xl:items-start">
                  <div class="inline-flex flex-col items-start gap-1">
                    <p class="flex flex-wrap items-baseline gap-x-2 gap-y-0.5">
                      <span class="text-lg font-semibold text-gray-800 dark:text-white/90" th:text="${ms.name}">이름</span>
                      <span class="text-sm font-normal text-gray-500 dark:text-gray-400" th:text="${ms.loginId}">아이디</span>
                    </p>
                    <div class="flex flex-row flex-wrap items-center gap-x-2 gap-y-1">
                      <p th:if="${ms.positionName != null}" class="text-sm text-gray-500 dark:text-gray-300"
                        th:text="${ms.positionName}">직급</p>
                      <div th:if="${ms.positionName != null and ms.deptName != null}"
                        class="h-3.5 w-px shrink-0 bg-gray-300 dark:bg-gray-700"></div>
                      <p th:if="${ms.deptName != null}" class="text-sm text-gray-500 dark:text-gray-300"
                        th:text="${ms.deptName}">부서</p>
                    </div>
                  </div>
                </div>
              </div>
          </section>
          <!-- [프로필 요약] End -->

          <!-- [개인 정보] -->
          <!--
              section 을 position:relative 로 강제 — 비번 wrapper(.profile-pwd-buttons-pin) 의
              lg 화면용 absolute 기준 컨테이너로 사용.
          -->
          <section
            class="rounded-xl border border-stroke bg-white p-6 shadow-sm dark:border-strokedark dark:bg-boxdark"
            style="position:relative;">

            <!-- 상단 row : 좌측 텍스트 영역 + 우측 수정 버튼 (이전 상태 그대로 복원) -->
            <div class="flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-between">

              <div>
                <h3 class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-6">
                  개인 정보
                </h3>

                <div class="grid grid-cols-1 gap-4 lg:grid-cols-2 lg:gap-7 2xl:gap-x-32">
                  <div>
                    <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">이름</p>
                    <p class="text-sm font-medium text-gray-800 dark:text-white/90" th:text="${ms.name}">-</p>
                  </div>
                  <div>
                    <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">이메일</p>
                    <p class="text-sm font-medium text-gray-800 dark:text-white/90" th:text="${ms.email != null ? ms.email : '-'}">-</p>
                  </div>
                  <div>
                    <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">연락처</p>
                    <p class="text-sm font-medium text-gray-800 dark:text-white/90" th:text="${ms.phone != null && !#strings.isEmpty(ms.phone) ? ms.phone : '-'}">-</p>
                  </div>
                  <div>
                    <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-300">생년월일</p>
                    <p class="text-sm font-medium text-gray-800 dark:text-white/90" th:text="${ms.birthDay != null ? #temporals.format(ms.birthDay, 'yyyy-MM-dd') : '-'}">-</p>
                  </div>
                </div>
              </div>

              <button type="button" onclick="openProfileEditModal()"
                class="flex w-full items-center justify-center gap-2 rounded-full border border-gray-300 bg-white px-4 py-3 text-sm font-medium text-gray-700 shadow-theme-xs hover:bg-gray-50 hover:text-gray-800 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-white/[0.03] dark:hover:text-gray-200 lg:inline-flex lg:w-auto">
                <svg class="fill-current" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd" clip-rule="evenodd" d="M15.0911 2.78206C14.2125 1.90338 12.7878 1.90338 11.9092 2.78206L4.57524 10.116C4.26682 10.4244 4.0547 10.8158 3.96468 11.2426L3.31231 14.3352C3.25997 14.5833 3.33653 14.841 3.51583 15.0203C3.69512 15.1996 3.95286 15.2761 4.20096 15.2238L7.29355 14.5714C7.72031 14.4814 8.11172 14.2693 8.42013 13.9609L15.7541 6.62695C16.6327 5.74827 16.6327 4.32365 15.7541 3.44497L15.0911 2.78206ZM12.9698 3.84272C13.2627 3.54982 13.7376 3.54982 14.0305 3.84272L14.6934 4.50563C14.9863 4.79852 14.9863 5.2734 14.6934 5.56629L14.044 6.21573L12.3204 4.49215L12.9698 3.84272ZM11.2597 5.55281L5.6359 11.1766C5.53309 11.2794 5.46238 11.4099 5.43238 11.5522L5.01758 13.5185L6.98394 13.1037C7.1262 13.0737 7.25666 13.003 7.35947 12.9002L12.9833 7.27639L11.2597 5.55281Z" fill="" />
                </svg>
                수정
              </button>
            </div>

            <!--
                비밀번호 변경/초기화 버튼들.
                ※ lg(≥1024px) : .profile-pwd-buttons-pin 미디어쿼리로 absolute right:1.5rem bottom:1.5rem
                  → 카드 흐름에서 빠져 카드 세로 길이가 좌측 grid 자연 높이로 고정되고,
                    좌측 row 2(연락처/생년월일) 라인과 같은 세로 위치에 자연 정렬됨.
                ※ lg 미만 : mt-6 로 자연 흐름 (수정 버튼 아래에 row 로 배치).
                ※ whitespace-nowrap 으로 "비밀번호 초기화" 의 '화' 줄바꿈 방지.
            -->
            <div class="profile-pwd-buttons-pin mt-6 flex gap-2"
              style="justify-content:flex-end;">
              <button type="button" onclick="openPasswordChangeModal()"
                class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-full border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 shadow-theme-xs transition hover:bg-gray-50 hover:text-gray-800 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
                비밀번호 변경
              </button>
              <button type="button" onclick="resetPassword()"
                class="inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-full border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 shadow-theme-xs transition hover:bg-gray-50 hover:text-gray-800 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-white/[0.03] dark:hover:text-gray-200">
                비밀번호 초기화
              </button>
            </div>
          </section>
   <!-- [개인 정보] End -->
        </div>

        <!-- [비로그인] 세션 없을 때 안내 -->
        <section th:unless="${session != null and session.memberSession != null}"
          class="rounded-xl border border-stroke bg-white p-8 text-center shadow-sm dark:border-strokedark dark:bg-boxdark">
          <p class="text-sm text-gray-600 dark:text-gray-300">
            로그인 후 프로필을 확인할 수 있습니다.
          </p>
        </section>
      </main>
      <!-- ===== Main Content End ===== -->
      <!-- BEGIN MODAL : fixed 포지션이므로 main space-y 에 포함하지 않음 -->
      <div th:replace="~{partials/profile/profile-info-modal}"></div>
      <!--
          [비밀번호 변경 모달] MASTER 의 /master/account/password 와 동일 입력 패턴 (current/new/confirm).
          ※ 모달 톤은 개인 정보 수정 모달과 동일 (rounded-2xl + indigo-200 / gray-200 버튼).
          ※ JS 핸들러는 profile.js 의 openPasswordChangeModal / closePasswordChangeModal / submitPasswordChange.
          ※ MASTER 비밀번호 변경 화면(master-container max-width: 520px) 의 사이즈에 맞춰
            inline style 로 max-width 강제 (Tailwind max-w-* 빌드 누락 케이스 방어).
          ※ 모달이 컴팩트해지도록 내부 padding 도 p-8 → p-6 으로 축소.
      -->
      <div id="passwordChangeModal"
        class="fixed inset-0 z-[100000] flex hidden items-center justify-center bg-black/50">
        <div
          class="mx-4 w-full rounded-2xl border border-stroke bg-white p-6 shadow-2xl dark:border-strokedark dark:bg-boxdark"
          style="max-width: 26rem;">
          <h3 class="mb-5 text-xl font-bold text-black dark:text-white">비밀번호 변경</h3>

          <div class="w-full space-y-3">
            <div class="flex flex-col gap-1">
              <label for="pwdCurrent" class="text-sm font-medium text-gray-600 dark:text-gray-300">현재 비밀번호</label>
              <input type="password" id="pwdCurrent" name="currentPassword" autocomplete="current-password"
                class="rounded border border-stroke bg-gray py-2 px-3 text-sm text-black outline-none focus:border-primary dark:text-white" />
            </div>

            <div class="flex flex-col gap-1">
              <label for="pwdNew" class="text-sm font-medium text-gray-600 dark:text-gray-300">새 비밀번호 (8자 이상)</label>
              <input type="password" id="pwdNew" name="newPassword" autocomplete="new-password" minlength="8"
                class="rounded border border-stroke bg-gray py-2 px-3 text-sm text-black outline-none focus:border-primary dark:text-white" />
            </div>

            <div class="flex flex-col gap-1">
              <label for="pwdConfirm" class="text-sm font-medium text-gray-600 dark:text-gray-300">새 비밀번호 확인</label>
              <input type="password" id="pwdConfirm" name="confirmPassword" autocomplete="new-password" minlength="8"
                class="rounded border border-stroke bg-gray py-2 px-3 text-sm text-black outline-none focus:border-primary dark:text-white" />
            </div>
          </div>

          <div class="mt-6 flex justify-center gap-3">
            <button type="button" onclick="submitPasswordChange()"
              class="w-24 rounded-lg bg-indigo-200 py-2.5 text-sm font-semibold text-indigo-700 transition hover:bg-indigo-300">
              변경
            </button>
            <button type="button" onclick="closePasswordChangeModal()"
              class="w-24 rounded-lg bg-gray-200 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">
              취소
            </button>
          </div>
        </div>
      </div>
      <!-- END MODAL -->
    </div>
    <!-- ===== Content Area End ===== -->
  </div>
  <!-- ===== Page Wrapper End ===== -->
  <script type="module" src="/js/index.js"></script>
  <script th:src="@{/js/profile.js}"></script>
</body>

</html>
