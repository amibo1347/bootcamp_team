<!-- ================================================================ -->
<!-- [전자결재 함 목록] colgroup — 동일 의미 열은 함마다 같은 너비 (내 결재함 기준) -->
<!-- lg(≥1024px) 에서만 고정 너비 적용 · title 은 가변 -->
<!-- ================================================================ -->
<th:block xmlns:th="http://www.thymeleaf.org">
  <!-- [내 결재함] -->
  <colgroup th:fragment="myInboxColgroup">
    <col class="approval-col-id" />
    <col class="approval-col-title" />
    <col class="approval-col-status" />
    <col class="approval-col-approver" />
    <col class="approval-col-comment" />
    <col class="approval-col-date" />
    <col class="approval-col-action" />
  </colgroup>

  <!-- [결재 대기함] -->
  <colgroup th:fragment="pendingInboxColgroup">
    <col class="approval-col-id" />
    <col class="approval-col-form" />
    <col class="approval-col-title" />
    <col class="approval-col-drafter" />
    <col class="approval-col-status" />
    <col class="approval-col-approver" />
    <col class="approval-col-date" />
    <col class="approval-col-action" />
  </colgroup>

  <!-- [완료함] -->
  <colgroup th:fragment="completedInboxColgroup">
    <col class="approval-col-id" />
    <col class="approval-col-title" />
    <col class="approval-col-drafter" />
    <col class="approval-col-status" />
    <col class="approval-col-approver" />
    <col class="approval-col-comment" />
    <col class="approval-col-date" />
  </colgroup>
</th:block>
