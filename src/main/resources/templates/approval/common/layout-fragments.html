<!-- ====================================================================== -->
<!-- [전자결재 공통 fragment] 빈 상태 · 로딩 스켈레톤 (선택적 재사용) -->
<!-- ====================================================================== -->
<th:block xmlns:th="http://www.thymeleaf.org">

  <!-- fragment: emptyState — 목록이 비었을 때 -->
  <th:block th:fragment="emptyState (message)">
    <div class="flex flex-col items-center justify-center rounded-xl border border-dashed border-gray-300 bg-gray-50 py-12 text-center dark:border-gray-700 dark:bg-white/[0.03]" role="status">
      <p class="text-sm text-gray-500 dark:text-gray-400" th:text="${message}">내용 없음</p>
    </div>
  </th:block>

  <!-- fragment: loadingSkeleton — 초기 로딩 자리표시 -->
  <th:block th:fragment="loadingSkeleton">
    <div class="animate-pulse space-y-3 rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-white/[0.03]" aria-hidden="true">
      <div class="h-4 w-1/3 rounded bg-gray-200 dark:bg-gray-700"></div>
      <div class="h-4 w-full rounded bg-gray-100 dark:bg-gray-800"></div>
      <div class="h-4 w-5/6 rounded bg-gray-100 dark:bg-gray-800"></div>
    </div>
  </th:block>

</th:block>
