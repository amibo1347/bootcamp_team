<!-- [관리자] 결재 대기함 — Mock: 보류(M) 클릭 시 ON_HOLD로 이동 후 완료함·내 결재함에서 확인 -->
<!-- 시드 데이터의 approverMemberId와 로그인 memberId가 다르면 목록이 비어 보일 수 있다. -->
<!-- ================================================================ -->
<div xmlns:th="http://www.thymeleaf.org" th:fragment="pendingInbox" class="space-y-4">
  <p class="text-sm text-gray-600 dark:text-gray-400">결재 대기 중인 문서입니다.</p>
  <div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-800">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-800">
      <thead class="bg-amber-50 dark:bg-amber-950/20">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300">번호</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300">제목</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300">기안자</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-700 dark:text-gray-300">처리</th>
        </tr>
      </thead>
      <tbody id="approval-pending-body" class="divide-y divide-gray-200 bg-white dark:divide-gray-800 dark:bg-white/[0.02]"></tbody>
    </table>
  </div>
  <div id="approval-pending-empty" class="hidden">
    <div class="flex flex-col items-center justify-center rounded-xl border border-dashed border-gray-300 bg-gray-50 py-12 text-center dark:border-gray-700 dark:bg-white/[0.03]" role="status">
      <p class="text-sm text-gray-500 dark:text-gray-400">대기 문서가 없습니다.</p>
    </div>
  </div>
</div>
