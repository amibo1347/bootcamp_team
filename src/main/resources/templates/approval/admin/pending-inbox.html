<!-- ================================================================ -->
<!-- [관리자] 결재 대기함 -->
<!-- ================================================================ -->
<div xmlns:th="http://www.thymeleaf.org" th:fragment="pendingInbox" class="approval-inbox-table-root space-y-4">
  <p class="text-sm text-gray-600 dark:text-gray-400">결재 대기 중인 문서입니다. 행의 제목을 클릭하면 본문을 확인할 수 있습니다.</p>

  <div class="approval-inbox-table-wrap rounded-xl border border-gray-200 dark:border-gray-800">
    <table class="approval-inbox-table min-w-full divide-y divide-gray-200 dark:divide-gray-800">
      <colgroup th:replace="~{approval/common/inbox-table-colgroup :: pendingInboxColgroup}"></colgroup>
      <thead class="bg-gray-50 dark:bg-white/[0.03]">
        <tr>
          <th scope="col" data-col="id">문서번호</th>
          <th scope="col" data-col="form">양식</th>
          <th scope="col" data-col="title">제목</th>
          <th scope="col" data-col="drafter">기안자</th>
          <th scope="col" data-col="status">상태</th>
          <th scope="col" data-col="approver">결재자</th>
          <th scope="col" data-col="date">기안일</th>
          <th scope="col" data-col="action" class="approval-inbox-th--right">처리</th>
        </tr>
      </thead>
      <tbody id="approval-pending-body" class="divide-y divide-gray-200 bg-white dark:divide-gray-800 dark:bg-white/[0.02]"></tbody>
    </table>
  </div>

  <div id="approval-pending-empty" class="hidden">
    <div class="flex flex-col items-center justify-center rounded-xl border border-dashed border-gray-300 bg-gray-50 py-12 text-center dark:border-gray-700 dark:bg-white/[0.03]" role="status">
      <p class="text-sm text-gray-500 dark:text-gray-400">대기 문서가 없습니다.</p>
    </div>
  </div>
</div>
