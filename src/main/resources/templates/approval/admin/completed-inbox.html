<!-- ================================================================ -->
<!-- [관리자] 완료함 — 승인·반려·보류(M) 처리 완료 건 -->
<!-- ================================================================ -->
<div xmlns:th="http://www.thymeleaf.org" th:fragment="completedInbox" class="space-y-4">
  <div class="flex flex-wrap items-center gap-2">
    <label for="approval-completed-filter" class="text-sm text-gray-600 dark:text-gray-400">상태</label>
    <select id="approval-completed-filter"
      class="rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white">
      <option value="ALL">전체</option>
      <option value="IN_PROGRESS">진행중</option>
      <option value="APPROVED">승인</option>
      <option value="REJECTED">반려</option>
      <option value="ON_HOLD">보류</option>
    </select>
  </div>
  <div class="overflow-x-auto rounded-xl border border-gray-200 dark:border-gray-800">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-800">
      <thead class="bg-gray-50 dark:bg-white/[0.03]">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">번호</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">제목</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">신청자</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">상태</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">결재자</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">사유</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 dark:text-gray-400">처리일</th>
        </tr>
      </thead>
      <tbody id="approval-completed-body" class="divide-y divide-gray-200 bg-white dark:divide-gray-800 dark:bg-white/[0.02]"></tbody>
    </table>
  </div>
  <div id="approval-completed-empty" class="hidden">
    <div class="flex flex-col items-center justify-center rounded-xl border border-dashed border-gray-300 bg-gray-50 py-12 text-center dark:border-gray-700 dark:bg-white/[0.03]" role="status">
      <p class="text-sm text-gray-500 dark:text-gray-400">완료된 문서가 없습니다.</p>
    </div>
  </div>
</div>
