<!-- ================================================================ -->
<!-- [휴가 양식 필드] 위저드 스텝3 동적 영역에 포함 -->
<!-- ================================================================ -->
<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="vacationFormFields">
  <!-- [휴가 신청 입력] 시작 -->
  <div id="approval-vacation-fields" data-approval-form-section="VACATION" class="space-y-3 rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-white/[0.03]">
    <p class="text-xs font-semibold text-gray-700 dark:text-gray-300">휴가 정보</p>
    <div class="grid gap-3 sm:grid-cols-2">
      <!-- [휴가 유형] DESIGN_RULES 5-2 커스텀 콤보박스 — approval-combobox.js -->
      <div class="relative z-20">
        <label for="vacation-type" class="mb-1 block text-sm text-gray-600 dark:text-gray-300">유형</label>
        <select id="vacation-type" class="sr-only pointer-events-none" tabindex="-1" aria-hidden="true">
          <option value="">선택하세요</option>
        </select>
      </div>
      <!-- [휴가 단위] 종일 / 오전 반차 / 오후 반차. 반차 선택 시 시작일 하루·0.5일로 자동 처리. -->
      <div>
        <label for="vacation-half" class="mb-1 block text-xs text-gray-600 dark:text-gray-400">휴가 단위</label>
        <select id="vacation-half"
          class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white">
          <option value="">종일</option>
          <option value="AM">오전 반차</option>
          <option value="PM">오후 반차</option>
        </select>
      </div>
      <div>
        <label for="vacation-start" class="mb-1 block text-xs text-gray-600 dark:text-gray-400">시작일</label>
        <input id="vacation-start" type="date"
          class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
      </div>
      <div>
        <label for="vacation-end" class="mb-1 block text-xs text-gray-600 dark:text-gray-400">종료일</label>
        <input id="vacation-end" type="date"
          class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white" />
      </div>
      <div class="sm:col-span-2">
        <label for="vacation-days" class="mb-1 block text-xs text-gray-600 dark:text-gray-400">일수</label>
        <input id="vacation-days" type="number" min="0" step="0.5" value="0" readonly
          class="w-full rounded-lg border border-gray-300 bg-gray-100 px-3 py-2 text-sm cursor-not-allowed dark:border-gray-700 dark:bg-gray-800 dark:text-white" />
      </div>
    </div>
  </div>
  <!-- [휴가 신청 입력] 끝 -->
</th:block>
