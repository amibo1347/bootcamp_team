<!-- ======================================================== -->
<!-- [일정 조회 페이지] : #calendar div에 FullCalendar 마운트. partials/calendar-event-modal로 이벤트 추가/수정 -->
<!-- ======================================================== -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>일정 조회 | 인트라넷</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  </head>
  <body
    x-data="{ page: 'calendar', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
  <!-- ===== Preloader Start ===== -->
  <div th:replace="~{partials/preloader}"></div>
  <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
  <!-- ===== Sidebar Start ===== -->
  <div th:replace="~{partials/sidebar}"></div>
  <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div
        class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden"
      >
  <!-- Small Device Overlay Start -->
  <div th:replace="~{partials/overlay}"></div>
  <!-- Small Device Overlay End -->

  <!-- ===== Header Start ===== -->
  <div th:replace="~{partials/header}"></div>
  <!-- ===== Header End ===== -->

        <!-- ===== Main Content Start ===== -->
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <!-- Breadcrumb Start -->
            <div x-data="{ pageName: `Calendar`}">
              <div th:replace="~{partials/breadcrumb}"></div>
            </div>
            <!-- Breadcrumb End -->

            <!-- [캘린더 상단 도구줄] 카테고리 관리는 일정 추가와 분리된 보조 기능 -->
            <div class="mb-4 flex flex-wrap items-center justify-end gap-3">
              <button
                type="button"
                id="btn-open-category-modal"
                class="inline-flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 shadow-sm transition hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-white/5"
              >
                <span class="inline-block h-3 w-3 rounded-full bg-gradient-to-br from-brand-400 to-violet-500" aria-hidden="true"></span>
                카테고리 관리
              </button>
            </div>

            <div
              class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
            >
              <div id="calendar" class="min-h-screen"></div>
            </div>

            <!-- BEGIN MODAL : 일정 -->
            <div th:replace="~{partials/calendar-event-modal}"></div>
            <!-- END MODAL : 일정 -->

            <!-- BEGIN MODAL : 카테고리 -->
            <div th:replace="~{partials/calendar-category-modal}"></div>
            <!-- END MODAL : 카테고리 -->
          </div>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <script type="module" src="/js/index.js"></script>
  </body>
</html>
