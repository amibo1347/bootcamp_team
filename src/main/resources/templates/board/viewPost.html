<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:text="${board.boardName} + ' - 상세보기'">게시글 상세보기</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
    <style>
        /* 게시글 상세(Viewer) 다크모드 색상 보정: Toast UI 기본 텍스트 색상 오버라이드 */
        .dark #postContent .toastui-editor-contents,
        .dark #postContent .toastui-editor-contents p,
        .dark #postContent .toastui-editor-contents li,
        .dark #postContent .toastui-editor-contents blockquote,
        .dark #postContent .toastui-editor-contents span {
            color: rgb(209 213 219);
        }

        /* 삭제 버튼 hover 색상은 디자인 규칙서의 공통 클래스 사용 */
        .btn-delete-hover:hover {
            background-color: #fda4af;
        }
    </style>
</head>

<body
    th:attr="data-board-id=${board.boardId},data-article-id=${articleId},data-current-member-id=${session.memberSession?.memberId},data-is-admin=${session.memberSession != null and session.memberSession.isAdmin()},data-comment-scope=${board.commentScope}"
    x-data="{ page: 'board', loaded: true, darkMode: false, stickyMenu: false, sidebarToggle: false, scrollTop: false }"
    x-init="darkMode = JSON.parse(localStorage.getItem('darkMode')); $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{ 'dark bg-gray-900': darkMode === true }">

    <!-- Preloader 시작 -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- Preloader 끝 -->

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar 시작 -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- Sidebar 끝 -->

        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div th:replace="~{partials/overlay}"></div>
            <div th:replace="~{partials/header}"></div>

            <!-- Content 시작 -->
            <main class="space-y-6 p-8">
                <section class="flex flex-wrap items-center justify-between gap-3">
                    <h2 class="text-2xl font-black text-gray-900 dark:text-white" th:text="${board.boardName}">게시판</h2>
                    <!-- 상단 액션 버튼 영역 시작 -->
                    <div class="flex flex-wrap items-center gap-2">
                        <a id="editPostButton"
                            class="hidden rounded-xl bg-indigo-200 px-6 py-2.5 font-medium text-indigo-700 shadow-sm transition-all hover:bg-indigo-300">
                            수정
                        </a>
                        <button id="deletePostButton" type="button"
                            class="btn-delete-hover hidden rounded-xl bg-rose-200 px-6 py-2.5 font-medium text-rose-500 shadow-sm transition-all">
                            삭제
                        </button>
                        <a th:href="@{/board/{id}(id=${board.boardId})}"
                            class="rounded-xl bg-gray-200 px-8 py-2.5 font-medium text-gray-700 shadow-sm transition-all hover:bg-gray-300 dark:!bg-white/10 dark:!text-gray-300 dark:hover:!bg-white/15">
                            목록으로
                        </a>
                    </div>
                    <!-- 상단 액션 버튼 영역 끝 -->
                </section>

                <section
                    class="overflow-hidden rounded-xl border border-stroke bg-white shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <header class="border-b border-gray-100 px-8 py-7 dark:border-strokedark">
                        <h3 id="postTitle" class="text-xl font-bold text-gray-900 dark:text-white">불러오는 중...</h3>
                        <div class="mt-5 flex flex-wrap items-center text-sm text-gray-500 dark:text-gray-300"
                            style="column-gap: 3rem; row-gap: 1rem;">
                            <span>작성자: <strong id="postAuthor"
                                    class="font-medium text-gray-700 dark:text-gray-100">-</strong></span>
                            <span>작성일: <strong id="postDate"
                                    class="font-medium text-gray-700 dark:text-gray-100">-</strong></span>
                            <span>조회수: <strong id="postViews"
                                    class="font-medium text-gray-700 dark:text-gray-100">0</strong></span>
                        </div>
                    </header>

                    <article id="postContent"
                        class="break-words px-8 text-base leading-8 text-gray-700 dark:text-gray-300 [&_*]:text-gray-700 dark:[&_*]:text-gray-300"
                        style="min-height: 20rem; padding-top: 2rem; padding-bottom: 9rem; font-size: 1rem;">
                    </article>

                    <!-- 첨부파일 섹션 시작 (첨부파일이 있을 때만 노출) -->
                    <section id="attachmentSection"
                        class="hidden border-t border-gray-100 px-8 py-6 dark:border-strokedark">
                        <h4 class="text-base font-bold text-gray-900 dark:text-white">첨부파일</h4>
                        <ul id="attachmentList" class="mt-3 space-y-2 text-sm text-gray-700 dark:text-gray-200"></ul>
                    </section>
                    <!-- 첨부파일 섹션 끝 -->

                    <!-- 댓글 섹션 시작 -->
                    <section id="commentsSection" class="border-t border-gray-100 px-8 py-6 dark:border-strokedark">
                        <div class="flex items-end">
                            <h4 class="text-base font-bold text-gray-900 dark:text-white">댓글</h4>
                            <!-- 정렬 (최신순/등록순) — '최신순'과 '등록순' 사이의 | 폭만큼 댓글에서 떨어진 위치에서 시작 -->
                            <div style="margin-left: 1.5rem;" class="flex items-end gap-3">
                                <div class="flex items-end gap-2">
                                    <a href="javascript:void(0)" onclick="setCommentSort('desc')" id="commentSortDesc"
                                        class="inline-flex items-end border-b-2 border-transparent pb-0.5 text-sm leading-none transition-all hover:text-primary text-gray-400 dark:text-gray-300">
                                        최신순
                                    </a>

                                    <span class="text-sm text-gray-300 dark:text-gray-300">|</span>

                                    <a href="javascript:void(0)" onclick="setCommentSort('asc')" id="commentSortAsc"
                                        class="inline-flex items-end border-b-2 border-primary pb-0.5 text-sm leading-none transition-all hover:text-primary text-primary font-bold">
                                        등록순
                                    </a>
                                </div>
                            </div>
                        </div>
                        <p id="commentsLoadError" class="mt-3 hidden text-sm text-rose-600 dark:text-rose-400"></p>
                        <p id="commentsLoading" class="mt-3 text-sm text-gray-500 dark:text-gray-400">댓글을 불러오는 중...</p>
                        <p id="commentsEmpty" class="mt-3 hidden text-sm text-gray-500 dark:text-gray-400">등록된 댓글이 없습니다.
                        </p>
                        <ul id="commentsList" class="mt-4 space-y-4 text-sm text-gray-800 dark:text-gray-200"></ul>

                        <div id="commentFormSection" class="mt-6 border-t border-gray-100 pt-6 dark:border-strokedark">
                            <label for="commentContentInput"
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300">댓글 작성</label>
                            <textarea id="commentContentInput" rows="3"
                                class="mt-2 w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-800 shadow-sm placeholder:text-gray-400 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-200 dark:border-strokedark dark:bg-boxdark dark:text-gray-100 dark:focus:border-indigo-500 dark:focus:ring-indigo-500/30"
                                placeholder="내용을 입력하세요."></textarea>
                            <div class="mt-3 flex flex-wrap items-center gap-2">
                                <button id="commentSubmitButton" type="button"
                                    class="rounded-xl bg-indigo-200 px-5 py-2 text-sm font-medium text-indigo-800 shadow-sm transition hover:bg-indigo-300 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-indigo-500/25 dark:text-indigo-100 dark:hover:bg-indigo-500/40">
                                    등록
                                </button>
                            </div>
                            <p id="commentGuestNotice" class="mt-2 hidden text-sm text-gray-500 dark:text-gray-400">
                                로그인 후 댓글을 작성할 수 있습니다.
                            </p>
                        </div>
                    </section>
                    <!-- 댓글 섹션 끝 -->
                </section>
            </main>
            <!-- Content 끝 -->
        </div>
    </div>

    <th:block th:replace="~{partials/floating-chat :: floatingChatGlobal}"></th:block>
    <script type="module" src="/js/index.js"></script>
    <script type="module" th:src="@{/js/floating-chat.js}"></script>
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="/js/board/detail.js"></script>
    <script src="/js/board/comments.js"></script>
</body>

</html>
