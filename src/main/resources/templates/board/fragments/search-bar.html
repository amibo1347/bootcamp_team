<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  게시판 검색 바 — 목록형/앨범형/카드형·통합 휴지통 공용.
  포함 요소: 기간 select / 검색 대상 select / 키워드 input / 검색 버튼.
  DESIGN_RULES 5-2: native select 는 .js-custom-select 로 표시만 두고,
  view.js · unifiedTrash.js 가 form-combobox UI 로 교체한다.
  레이아웃: 폭을 최대 720px 로 제한하고 가운데 정렬 — 우측 하단 채팅 위젯과 겹치지 않게 한다.
-->
<section th:fragment="searchBar"
         class="mx-auto w-full max-w-3xl rounded-xl border border-stroke bg-white px-4 py-3 shadow-sm dark:border-strokedark dark:bg-boxdark">
    <form id="postSearchForm" class="flex flex-wrap items-center justify-center gap-2"
          onsubmit="return false">
        <!-- [기간] relative z-20 — 드롭다운 패널 겹침 방지 -->
        <div class="relative z-20 w-36 shrink-0">
            <label class="sr-only" for="postSearchPeriod">기간</label>
            <select id="postSearchPeriod" name="period" class="js-custom-select">
                <option value="ALL">전체 기간</option>
                <option value="1W">1주일</option>
                <option value="1M">1개월</option>
                <option value="3M">3개월</option>
                <option value="6M">6개월</option>
                <option value="1Y">1년</option>
            </select>
        </div>

        <!-- [검색 대상] relative z-20 — 드롭다운 패널 겹침 방지 -->
        <div class="relative z-20 w-40 shrink-0">
            <label class="sr-only" for="postSearchType">검색 대상</label>
            <select id="postSearchType" name="searchType" class="js-custom-select">
                <option value="ALL">제목 + 내용</option>
                <option value="TITLE">제목만</option>
                <option value="AUTHOR">작성자</option>
            </select>
        </div>

        <label class="sr-only" for="postSearchKeyword">검색어</label>
        <input id="postSearchKeyword" name="keyword" type="text"
               placeholder="검색어를 입력하세요"
               class="h-11 w-48 flex-1 rounded-xl border border-stroke bg-white px-3 text-sm text-gray-700 placeholder:text-gray-400 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 dark:border-strokedark dark:bg-meta-4 dark:text-white dark:placeholder:text-gray-300 sm:w-56 sm:max-w-xs" />
        <button type="submit"
                class="inline-flex h-11 items-center justify-center rounded-xl bg-indigo-400 px-5 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-500">
            검색
        </button>
    </form>
</section>

</body>
</html>
