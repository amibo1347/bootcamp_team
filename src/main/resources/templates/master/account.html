<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" th:href="@{/css/master.css}" />
  <title>MASTER 계정 관리</title>
</head>

<body class="master-page">
  <div class="master-shell">
    <div class="master-container" style="max-width: 520px;">
      <div class="master-panel">

        <a th:href="@{/master}" class="master-link">← 콘솔로 돌아가기</a>

        <div style="margin-top: 0.75rem;">
          <span class="master-badge">MASTER</span>
          <h1 class="master-title">계정 관리</h1>
          <p class="master-sub">본인 계정 정보 확인 및 비밀번호를 변경합니다.</p>
        </div>

        <!-- 프로필 (읽기 전용) -->
        <dl class="master-info">
          <div>
            <dt>아이디</dt>
            <dd th:text="${master != null ? master.loginId : '-'}">loginId</dd>
          </div>
          <div>
            <dt>이름</dt>
            <dd th:text="${master != null ? master.name : '-'}">이름</dd>
          </div>
          <div>
            <dt>이메일</dt>
            <dd th:text="${master != null and master.email != null and !master.email.isBlank() ? master.email : '-'}">이메일</dd>
          </div>
        </dl>

        <hr class="master-divider" />
        <h2 class="master-section-title">비밀번호 변경</h2>

        <div th:if="${errorMessage != null}" class="alert-box alert-error"
             style="margin-bottom: 1rem;" role="alert">
          <span th:text="${errorMessage}">오류 메시지</span>
        </div>
        <div th:if="${successMessage != null}" class="alert-box alert-success"
             style="margin-bottom: 1rem;" role="status">
          <span th:text="${successMessage}">완료 메시지</span>
        </div>

        <!-- th:action 으로 CSRF 토큰 자동 주입 -->
        <form method="post" th:action="@{/master/account/password}">
          <div class="field-group">
            <label for="currentPassword" class="field-label">현재 비밀번호</label>
            <input type="password" id="currentPassword" name="currentPassword" class="field-input"
                   autocomplete="current-password" required />
          </div>
          <div class="field-group">
            <label for="newPassword" class="field-label">새 비밀번호 (8자 이상)</label>
            <input type="password" id="newPassword" name="newPassword" class="field-input"
                   autocomplete="new-password" minlength="8" required />
          </div>
          <div class="field-group" style="margin-bottom: 0;">
            <label for="confirmPassword" class="field-label">새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" name="confirmPassword" class="field-input"
                   autocomplete="new-password" minlength="8" required />
          </div>
          <button type="submit" class="master-btn" style="margin-top: 1.5rem;">비밀번호 변경</button>
        </form>

      </div>
    </div>
  </div>
</body>

</html>
