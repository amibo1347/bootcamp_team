<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" th:href="@{/css/master.css}" />
  <title>시스템 공지</title>
</head>

<body class="master-page">
  <div class="master-shell">
    <div class="master-container">
      <div class="master-panel">

        <a th:href="@{/master}" class="master-link">← 콘솔로 돌아가기</a>

        <div style="margin-top: 0.75rem;">
          <span class="master-badge">MASTER</span>
          <h1 class="master-title">시스템 공지 / 점검 안내</h1>
          <p class="master-sub">전체 회사의 회원 화면 상단에 배너로 노출됩니다.</p>
        </div>

        <div th:if="${errorMessage != null}" class="alert-box alert-error"
             style="margin-top: 1.25rem;" role="alert">
          <span th:text="${errorMessage}">오류 메시지</span>
        </div>
        <div th:if="${successMessage != null}" class="alert-box alert-success"
             style="margin-top: 1.25rem;" role="status">
          <span th:text="${successMessage}">완료 메시지</span>
        </div>

        <!-- 공지 목록 -->
        <table class="master-table">
          <thead>
            <tr>
              <th>유형</th>
              <th>내용</th>
              <th>시작</th>
              <th>종료</th>
              <th>노출</th>
              <th style="text-align: right;">삭제</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${notices == null or notices.isEmpty()}">
              <td colspan="6" class="master-empty">등록된 공지가 없습니다.</td>
            </tr>
            <tr th:each="notice : ${notices}">
              <td>
                <span th:if="${notice.noticeType.name() == 'MAINTENANCE'}"
                      class="master-tag master-tag--off">점검</span>
                <span th:unless="${notice.noticeType.name() == 'MAINTENANCE'}"
                      class="master-tag master-tag--muted">공지</span>
              </td>
              <td th:text="${notice.content}">내용</td>
              <td th:text="${notice.startsAt != null
                            ? #temporals.format(notice.startsAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
              <td th:text="${notice.endsAt != null
                            ? #temporals.format(notice.endsAt, 'yyyy-MM-dd HH:mm') : '무기한'}">-</td>
              <td>
                <span th:if="${notice.isVisibleAt(now)}" class="master-tag master-tag--on">노출 중</span>
                <span th:unless="${notice.isVisibleAt(now)}" class="master-tag master-tag--muted">대기/종료</span>
              </td>
              <td style="text-align: right;">
                <!-- th:action 으로 CSRF 토큰 자동 주입 -->
                <form method="post" th:action="@{/master/notices/{id}/delete(id=${notice.noticeId})}">
                  <button type="submit" class="master-btn-outline">삭제</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>

        <hr class="master-divider" />
        <h2 class="master-section-title">새 공지 등록</h2>

        <!-- th:action 으로 CSRF 토큰 자동 주입 -->
        <form method="post" th:action="@{/master/notices}">
          <div class="field-group">
            <label for="content" class="field-label">공지 내용</label>
            <textarea id="content" name="content" class="field-input" required
                      style="height: auto; min-height: 5rem; padding: 0.7rem 1rem; resize: vertical;"></textarea>
          </div>
          <div class="field-group">
            <label for="noticeType" class="field-label">유형</label>
            <select id="noticeType" name="noticeType" class="field-input">
              <option value="NOTICE">일반 공지</option>
              <option value="MAINTENANCE">점검 안내</option>
            </select>
          </div>
          <div class="field-group">
            <label for="startsAt" class="field-label">시작 시각 (비우면 즉시 시작)</label>
            <input type="datetime-local" id="startsAt" name="startsAt" class="field-input" />
          </div>
          <div class="field-group" style="margin-bottom: 0;">
            <label for="endsAt" class="field-label">종료 시각 (비우면 무기한)</label>
            <input type="datetime-local" id="endsAt" name="endsAt" class="field-input" />
          </div>
          <button type="submit" class="master-btn" style="margin-top: 1.5rem;">공지 등록</button>
        </form>

      </div>
    </div>
  </div>
</body>

</html>
