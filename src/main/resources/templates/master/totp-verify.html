<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" th:href="@{/css/master.css}" />
  <title>MASTER 2차 인증</title>
</head>

<body class="master-page">
  <div class="master-auth">
    <div class="master-card">
      <div style="text-align: center; margin-bottom: 1.75rem;">
        <span class="master-badge">MASTER</span>
        <h1 class="master-title">2차 인증</h1>
        <p class="master-sub">인증기 앱에 표시된 6자리 코드를 입력하세요.</p>
      </div>

      <div th:if="${errorMessage != null}" class="alert-box alert-error"
           style="margin-bottom: 1.25rem;" role="alert">
        <span th:text="${errorMessage}">오류 메시지</span>
      </div>

      <!-- th:action 으로 CSRF 토큰 자동 주입 -->
      <form method="post" th:action="@{/master/totp/verify}">
        <div class="field-group" style="margin-bottom: 0;">
          <label for="code" class="field-label">인증 코드</label>
          <input type="text" id="code" name="code" class="field-input field-input--code"
                 inputmode="numeric" autocomplete="one-time-code" maxlength="6"
                 placeholder="000000" required autofocus />
        </div>
        <button type="submit" class="master-btn-outline master-btn--block" style="margin-top: 1.5rem; display: block; width: 100%;">확인</button>
      </form>
    </div>
  </div>
</body>

</html>
