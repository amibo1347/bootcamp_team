<!-- ======================================================== -->
<!-- [설정 페이지] : 사이드바/헤더 공통 레이아웃. 본문은 page-main 영역 -->
<!-- ======================================================== -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>설정 | 인트라넷</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  </head>
  <body
    x-data="{ page: 'settings', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <div th:replace="~{partials/sidebar}"></div>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div class="page-content">
        <div th:replace="~{partials/overlay}"></div>
        <div th:replace="~{partials/header}"></div>
        <!-- ===== Main Content Start ===== -->
        <main class="page-main">
          <h2 class="page-heading">설정</h2>
          <section
            class="rounded-xl border border-stroke bg-white p-6 shadow-sm dark:border-strokedark dark:bg-boxdark">
            <p class="text-sm text-gray-500 dark:text-gray-300">설정 페이지 준비 중입니다.</p>
          </section>
        </main>
        <!-- ===== Main Content End ===== -->
      </div>
      <!-- ===== Content Area End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->
    <script type="module" src="/js/index.js"></script>
  </body>
</html>
