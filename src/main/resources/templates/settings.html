<!-- ======================================================== -->
<!-- [설정 페이지] : 사이드바/헤더/브레드크럼 공통 레이아웃. 설정 컨텐츠는 main 영역에 추가 -->
<!-- ======================================================== -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>설정 | 인트라넷</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
  </head>
  <body
    x-data="{ page: 'settings', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <div th:replace="~{partials/sidebar}"></div>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Content Area Start ===== -->
      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
        <div th:replace="~{partials/overlay}"></div>
        <div th:replace="~{partials/header}"></div>
        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <div x-data="{ pageName: `Settings`}">
              <div th:replace="~{partials/breadcrumb}"></div>
            </div>
            <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] lg:p-6">
              <h3 class="mb-5 text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-7">Settings</h3>
              <p class="text-sm text-gray-500 dark:text-gray-300">Settings page placeholder.</p>
            </div>
          </div>
        </main>
      </div>
    </div>
    <th:block th:replace="~{partials/floating-chat :: floatingChatGlobal}"></th:block>
    <script type="module" src="/js/index.js"></script>
    <script type="module" th:src="@{/js/floating-chat.js}"></script>
  </body>
</html>
