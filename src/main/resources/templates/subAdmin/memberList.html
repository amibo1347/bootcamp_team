<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>
        Member List
    </title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
    <style>
        /* 삭제(퇴사) 버튼 호버 색상 고정 */
        .btn-delete-hover:hover {
            background-color: #fda4af;
        }
    </style>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
            darkMode = JSON.parse(localStorage.getItem('darkMode'));
            $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="page-content">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->

            <main class="page-main">
                <h2 class="page-heading">조직도 구성</h2>

                <div
                    class="mb-6 rounded-xl border border-stroke bg-white px-5 py-4 shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <form action="/admin/memberList" method="get" id="filterForm"
                        onsubmit="event.preventDefault(); loadMemberList();"
                        class="flex flex-col sm:flex-row items-end justify-between gap-6">

                        <input type="hidden" name="sort" id="sortInput" th:value="${currentSort}">
                        <!--
                            상태 필터 (활성/휴직/퇴사) - 탭 클릭으로 값이 바뀐다.
                            ※ 백엔드는 다중 상태 조회를 위해 selectedStatus(단일) / selectedStatuses(다중) 둘 다 노출한다.
                            ※ 퇴사 탭(LEAVE + BANNED)으로 진입한 경우 selectedStatus 는 null 이 되므로,
                              selectedStatuses 의 첫 번째 enum 을 기준으로 'LEAVE' 로 fallback 시켜야 새로고침/검색 시에도 탭이 유지된다.
                              loadMemberList() 가 'LEAVE' 를 감지하면 다시 LEAVE + BANNED 두 값을 함께 보낸다.
                        -->
                        <input type="hidden" name="status" id="statusInput"
                            th:value="${
                                selectedStatuses != null and not #lists.isEmpty(selectedStatuses)
                                    ? ((selectedStatuses[0].name() == 'LEAVE' or selectedStatuses[0].name() == 'BANNED')
                                        ? 'LEAVE'
                                        : selectedStatuses[0].name())
                                    : (selectedStatus != null ? selectedStatus.name() : 'JOIN')
                            }">

                        <!--
                            부서/직위 드롭다운 컨테이너.
                            ※ 검색 영역과 동일하게 flex:1 로 form 의 절반을 차지하도록 inline style 로 강제.
                              (sm:flex-1 클래스만으로는 일부 환경에서 의도대로 안 펴지는 케이스가 있었음.)
                            ※ paddingRight: 1.5rem 으로 세로선과 간격 확보. (검색 영역과 동일한 시각적 간격)
                        -->
                        <div class="flex items-end gap-6 w-full sm:flex-1 sm:pr-6"
                            style="flex: 1 1 0%; min-width: 0; padding-right: 1.5rem;">
                            <div class="relative z-20" style="flex: 1 1 0%; min-width: 0;">
                                <label class="mb-1 block text-xs font-medium text-gray-500 dark:text-gray-300">부서별 조회</label>
                                <select name="deptId" id="deptSelect" onchange="onDeptSelectChange(this)"
                                    class="js-custom-select relative z-20 w-full appearance-none rounded border border-stroke bg-transparent py-2.5 px-4 outline-none transition focus:border-primary active:border-primary dark:border-form-strokedark dark:bg-meta-4 text-black dark:text-white">
                                    <option value="">전체 부서</option>
                                    <option value="__NEW_DEPT__">신규 부서</option>
                                    <option th:each="dept : ${depts}" th:value="${dept.deptId}"
                                        th:text="${dept.deptName}" th:selected="${dept.deptId == selectedDeptId}">
                                    </option>
                                </select>
                            </div>
                            <div class="relative z-20" style="flex: 1 1 0%; min-width: 0;">
                                <label class="mb-1 block text-xs font-medium text-gray-500 dark:text-gray-300">직위별 조회</label>
                                <select name="positionId" id="positionSelect" onchange="onPositionSelectChange(this)"
                                    class="js-custom-select relative z-20 w-full appearance-none rounded border border-stroke bg-transparent py-2.5 px-4 outline-none transition focus:border-primary active:border-primary dark:border-form-strokedark dark:bg-meta-4 text-black dark:text-white">
                                    <option value="">전체 직급</option>
                                    <option value="__NEW_POSITION__">신규 직급</option>
                                    <option th:each="pos : ${positions}" th:value="${pos.positionId}"
                                        th:text="${pos.positionName}"
                                        th:selected="${pos.positionId == selectedPositionId}"
                                        th:attr="data-level=${pos.positionLevel}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="hidden sm:block h-10 w-[1px] bg-gray-200 dark:bg-strokedark"></div>

                        <div class="flex items-end gap-3 w-full sm:flex-1" style="flex: 1 1 0%; min-width: 0;">
                            <div class="w-full"> <label class="mb-1 block text-xs font-medium text-gray-500 dark:text-gray-300">직원 이름
                                    검색</label>
                                <input type="text" id="searchKeyword" name="keyword" th:value="${keyword}" placeholder="이름을 입력하세요"
                                    class="w-full rounded border border-stroke bg-gray py-2 px-4 text-black focus:border-primary focus-visible:outline-none dark:border-strokedark dark:bg-meta-4 dark:text-white" />
                            </div>

                            <button type="submit"
                                class="flex h-[42px] shrink-0 items-center justify-center rounded-xl bg-indigo-400 py-2 px-6 font-medium text-white hover:bg-indigo-500">
                                검색
                            </button>
                        </div>
                    </form>
                </div>


                <!--
                    인사이동 패널: 부서/직급 선택 + [등록] 버튼.
                    ※ 인사이동 토글 OFF 일 때는 hidden. (memberList.js 의 toggleReassignMode() 가 토글)
                    ※ 부서 select / 직급 select 모두 "신규 부서" / "신규 직급" 옵션은 제외 (검색 필터와 동일한 데이터에서 제외).
                    ※ 부서 또는 직급 중 한 쪽만 선택해도 그 한 쪽만 일괄 변경된다 (백엔드 reassignMembers 가 null 을 허용).
                -->
                <div id="reassignPanel"
                    class="hidden mb-2 rounded-xl border border-stroke bg-white px-5 py-4 shadow-sm dark:border-strokedark dark:bg-boxdark">
                    <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                        <div class="flex flex-1 items-end gap-6">
                            <div class="relative z-20 w-1/2">
                                <label class="mb-1 block text-xs font-medium text-gray-500 dark:text-gray-300">부서 선택</label>
                                <select id="reassignDeptSelect"
                                    class="js-custom-select relative z-20 w-full appearance-none rounded border border-stroke bg-transparent py-2.5 px-4 outline-none transition focus:border-primary active:border-primary dark:border-form-strokedark dark:bg-meta-4 text-black dark:text-white">
                                    <option value="">부서 선택</option>
                                    <option th:each="dept : ${depts}" th:value="${dept.deptId}" th:text="${dept.deptName}"></option>
                                </select>
                            </div>
                            <div class="relative z-20 w-1/2">
                                <label class="mb-1 block text-xs font-medium text-gray-500 dark:text-gray-300">직급 선택</label>
                                <select id="reassignPositionSelect"
                                    class="js-custom-select relative z-20 w-full appearance-none rounded border border-stroke bg-transparent py-2.5 px-4 outline-none transition focus:border-primary active:border-primary dark:border-form-strokedark dark:bg-meta-4 text-black dark:text-white">
                                    <option value="">직급 선택</option>
                                    <option th:each="pos : ${positions}" th:value="${pos.positionId}"
                                        th:text="${pos.positionName}" th:attr="data-level=${pos.positionLevel}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="flex items-end gap-2">
                            <span id="reassignSelectedCount" class="text-sm text-gray-500 dark:text-gray-300">선택 0명</span>
                            <button type="button" onclick="submitReassign()"
                                class="flex h-[42px] shrink-0 items-center justify-center rounded-xl bg-indigo-400 py-2 px-6 text-sm font-medium text-white transition hover:bg-indigo-500">
                                등록
                            </button>
                        </div>
                    </div>
                </div>

                <div id="memberListContainer" class="flex flex-col gap-4">
                    <!--
                        fragment 컨테이너
                        ※ 휴직/퇴사 탭은 직원 수가 적어 페이지가 짧음 → 세로 스크롤바가 사라짐 → 콘텐츠 영역이 스크롤바 폭(약 15px)만큼 좌우로 늘어남.
                          JOIN 탭(직원 많음 = 스크롤바 있음)과 폭을 동일하게 유지하기 위해, JOIN 이 아닐 때만 min-h-screen 으로 페이지를 강제로 길게 만들어
                          항상 스크롤바가 표시되도록 한다.
                    -->
                    <div th:fragment="memberListFragment"
                        th:classappend="${selectedStatusKey != 'JOIN' ? 'min-h-screen' : ''}"
                        class="rounded-xl border border-stroke bg-white p-6 shadow-sm dark:border-strokedark dark:bg-boxdark">

                        <!-- 카드 헤더: 좌측 상태별 탭 + 우측 정렬 -->
                        <!--
                            현재 탭 키 결정 (selectedStatusKey).
                            ※ 백엔드는 다중 상태 조회를 위해 selectedStatus(단일) 와 selectedStatuses(다중) 둘 다 노출한다.
                              - 단일 선택 시: selectedStatus.name() → 'JOIN' / 'ON_LEAVE' / 'LEAVE'
                              - 다중 선택 시(현재는 퇴사 탭에서 LEAVE + BANNED 두 개 전송): selectedStatuses 의 첫 번째를 본다.
                                LEAVE 또는 BANNED 가 첫 번째이면 '퇴사 직원 목록' 탭으로 간주하여 'LEAVE' 로 통일한다.
                              - 그 외(아무것도 안 들어옴, 초기 진입): 기본값 'JOIN'.
                        -->
                        <th:block th:with="selectedStatusKey=${
                            selectedStatuses != null and not #lists.isEmpty(selectedStatuses)
                                ? ((selectedStatuses[0].name() == 'LEAVE' or selectedStatuses[0].name() == 'BANNED')
                                    ? 'LEAVE'
                                    : selectedStatuses[0].name())
                                : (selectedStatus != null ? selectedStatus.name() : 'JOIN')
                        }">
                        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                            <!-- 상태별 탭 (활성: JOIN / 휴직: ON_LEAVE / 퇴사: LEAVE) -->
                            <div class="flex items-center gap-3">
                                <!--
                                    [인사이동 모드 전용] 전체선택 체크박스.
                                    ※ 기본은 hidden. js-reassign-* 클래스는 memberList.js 의 toggleReassignMode() 가 hidden 클래스를 토글한다.
                                    ※ 활성 직원 탭(JOIN)에서만 의미가 있으므로 JOIN 탭일 때만 렌더링.
                                -->
                                <th:block th:if="${selectedStatusKey == 'JOIN'}">
                                    <input type="checkbox" id="reassignSelectAll" onclick="onReassignSelectAll(this)"
                                        class="js-reassign-toggle js-reassign-select-all hidden h-5 w-5 cursor-pointer accent-indigo-500" />
                                </th:block>

                                <!--
                                    [부서 소속 직원 목록] 탭
                                    ※ 부서별 조회 드롭다운에서 특정 부서를 고르면 "{부서명} 소속 직원 목록" 으로 동적으로 바뀐다.
                                      depts 리스트를 순회해 selectedDeptId 와 일치하는 dept 의 이름만 출력 (0개 또는 1개만 매칭).
                                    ※ 전체 부서일 때는 기본 문구 "부서 소속 직원 목록" 으로 보여준다.
                                -->
                                <a href="javascript:void(0)" data-status="JOIN"
                                    onclick="selectStatusTab('JOIN')"
                                    th:classappend="${selectedStatusKey == 'JOIN' ? 'text-primary font-bold border-b-2 border-primary' : 'text-gray-400 dark:text-gray-300'}"
                                    class="js-status-tab text-lg font-semibold transition-all hover:text-primary">
                                    <th:block th:if="${selectedDeptId == null}">부서 소속 직원 목록</th:block>
                                    <th:block th:if="${selectedDeptId != null}">
                                        <th:block th:each="d : ${depts}"
                                            th:if="${d.deptId == selectedDeptId}"
                                            th:text="|${d.deptName} 소속 직원 목록|"></th:block>
                                    </th:block>
                                </a>

                                <span class="text-gray-300 dark:text-gray-300">|</span>

                                <a href="javascript:void(0)" data-status="ON_LEAVE"
                                    onclick="selectStatusTab('ON_LEAVE')"
                                    th:classappend="${selectedStatusKey == 'ON_LEAVE' ? 'text-primary font-bold border-b-2 border-primary' : 'text-gray-400 dark:text-gray-300'}"
                                    class="js-status-tab text-lg font-semibold transition-all hover:text-primary">
                                    휴직 직원 목록
                                </a>

                                <span class="text-gray-300 dark:text-gray-300">|</span>

                                <a href="javascript:void(0)" data-status="LEAVE"
                                    onclick="selectStatusTab('LEAVE')"
                                    th:classappend="${selectedStatusKey == 'LEAVE' ? 'text-primary font-bold border-b-2 border-primary' : 'text-gray-400 dark:text-gray-300'}"
                                    class="js-status-tab text-lg font-semibold transition-all hover:text-primary">
                                    퇴사 직원 목록
                                </a>

                                <!--
                                    인사이동 토글 버튼.
                                    ※ JOIN 탭에서만 의미가 있으므로 JOIN 탭에서만 렌더링.
                                    ※ ml-4 로 [퇴사 직원 목록] 텍스트와 시각적 간격 확보.
                                -->
                                <th:block th:if="${selectedStatusKey == 'JOIN'}">
                                    <button type="button" id="reassignToggleBtn" onclick="toggleReassignMode()"
                                        class="ml-4 flex h-[34px] shrink-0 items-center justify-center rounded-md bg-indigo-400 px-4 text-sm font-medium text-white transition hover:bg-indigo-500">
                                        인사이동
                                    </button>
                                </th:block>
                            </div>

                            <!-- 정렬 (높은순/낮은순) -->
                            <div class="flex items-center gap-3">
                                <div class="flex gap-2">

                                    <a href="javascript:void(0)" onclick="submitWithSort('desc')"
                                        th:classappend="${currentSort == 'desc' ? 'text-primary font-bold border-b-2 border-primary' : 'text-gray-400 dark:text-gray-300'}"
                                        class="text-sm transition-all hover:text-primary">
                                        높은순
                                    </a>

                                    <span class="text-sm text-gray-300 dark:text-gray-300">|</span>

                                    <a href="javascript:void(0)" onclick="submitWithSort('asc')"
                                        th:classappend="${currentSort == 'asc' ? 'text-primary font-bold border-b-2 border-primary' : 'text-gray-400 dark:text-gray-300'}"
                                        class="text-sm transition-all hover:text-primary">
                                        낮은순
                                    </a>

                                </div>
                            </div>
                        </div>

                        <div th:if="${members != null and !#lists.isEmpty(members)}" class="space-y-4">
                            <div th:each="emp : ${members}"
                                class="rounded-2xl border border-stroke p-5 transition-hover hover:shadow-md dark:border-strokedark bg-white dark:bg-boxdark">

                                <div class="flex flex-col gap-5 xl:flex-row xl:items-center xl:justify-between">

                                    <div class="flex items-center gap-5">

                                        <!--
                                            [인사이동 모드 전용] 개별 회원 체크박스.
                                            ※ 기본 hidden. JOIN 탭에서만 인사이동 의미가 있으므로 JOIN 탭에서만 렌더링.
                                        -->
                                        <th:block th:if="${selectedStatusKey == 'JOIN'}">
                                            <input type="checkbox" th:value="${emp.memberId}"
                                                onclick="onReassignMemberCheck(this)"
                                                class="js-reassign-toggle js-reassign-member-check hidden h-5 w-5 cursor-pointer accent-indigo-500" />
                                        </th:block>

                                        <!--
                                            프로필 사진
                                            ※ LEAVE/BANNED 상태는 anonymizePii() 로 profileImg 가 null 이 된다.
                                              이미지 응답이 빈 바디로 와도 깨지지 않도록 onerror 폴백 SVG 로 대체한다.
                                        -->
                                        <div class="flex items-center gap-4">
                                            <div class="shrink-0">
                                                <img th:src="@{/api/member/{id}/profileImg(id=${emp.memberId})}"
                                                    alt="프로필"
                                                    onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23cbd5e1%22&gt;&lt;path d=%22M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z%22/&gt;&lt;/svg&gt;';"
                                                    class="h-16 w-16 rounded-full object-cover border border-stroke dark:border-strokedark bg-slate-100" />
                                            </div>
                                        </div>

                                        <div class="flex flex-col gap-1">
                                            <div class="flex flex-wrap items-center gap-2">
                                                <span class="text-xl font-bold text-black dark:text-white"
                                                    th:text="${emp.name}">이름</span>
                                                <!-- 부서/직급: JOIN/ON_LEAVE 탭에서만 -->
                                                <th:block th:if="${selectedStatusKey != 'LEAVE'}">
                                                    <span
                                                        class="rounded-full bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 dark:bg-blue-500/15 dark:text-blue-300"
                                                        th:text="${emp.dept != null ? emp.dept.deptName : '미지정'}">부서</span>
                                                    <span class="text-sm font-medium text-gray-500 dark:text-gray-300"
                                                        th:text="${emp.position != null ? emp.position.positionName : '직급 미지정'}">직급</span>
                                                </th:block>
                                            </div>

                                            <!--
                                                연락처/이메일은 모든 탭에서 노출.
                                                ※ anonymizePii() 도 이름/전화/이메일은 의도적으로 보존한다 (퇴사 후 문의 대응 목적).
                                            -->
                                            <span class="text-sm text-gray-600 dark:text-gray-300"
                                                th:text="${emp.email != null ? emp.email : '-'}">이메일</span>
                                            <span class="text-sm text-gray-600 dark:text-gray-300"
                                                th:text="${emp.phone != null ? emp.phone : '-'}">연락처</span>

                                            <!-- 생년월일/입사일: 퇴사 탭에서는 익명화로 null 이므로 숨김 -->
                                            <th:block th:if="${selectedStatusKey != 'LEAVE'}">
                                                <div class="mt-1 flex flex-wrap gap-4 text-sm text-gray-600 dark:text-gray-300">
                                                    <span>생년월일:
                                                        <span
                                                            th:text="${emp.birthDay != null ? #temporals.format(emp.birthDay, 'yyyy-MM-dd') : '-'}">-</span>
                                                    </span>
                                                    <span>입사일:
                                                        <span
                                                            th:text="${emp.acceptedAt != null ? #temporals.format(emp.acceptedAt, 'yyyy-MM-dd') : '-'}">-</span>
                                                    </span>
                                                </div>
                                            </th:block>
                                        </div>
                                    </div>

                                    <!-- 행별 액션 버튼: selectedStatusKey(= selectedStatus.name()) 에 따라 분기 -->
                                    <div class="flex flex-col gap-2">

                                        <!-- [활성 직원 탭] 수정 / 휴직 / 퇴사 -->
                                        <th:block th:if="${selectedStatusKey == 'JOIN'}">
                                            <!-- 수정 버튼 (Secondary, indigo-200) -->
                                            <button type="button"
                                                class="rounded-md bg-indigo-200 px-6 py-1 text-sm font-medium text-indigo-700 transition hover:bg-indigo-300 js-edit-member-btn"
                                                th:attr="data-member-id=${emp.memberId},
                                                             data-member-name=${emp.name},
                                                             data-dept-id=${emp.dept != null ? emp.dept.deptId : ''},
                                                             data-dept-name=${emp.dept != null ? emp.dept.deptName : '미지정'},
                                                             data-position-id=${emp.position != null ? emp.position.positionId : ''},
                                                             data-position-name=${emp.position != null ? emp.position.positionName : '미지정'},
                                                             data-email=${emp.email != null ? emp.email : ''},
                                                             data-phone=${emp.phone != null ? emp.phone : ''},
                                                             data-birth=${emp.birthDay != null ? #temporals.format(emp.birthDay, 'yyyy-MM-dd') : ''},
                                                             data-profile-img=@{/api/member/{id}/profileImg(id=${emp.memberId})}">
                                                수정
                                            </button>
                                            <!-- 휴직 버튼 (State Toggle - Pause, violet-200) -->
                                            <button type="button" th:attr="onclick=|leaveMember(${emp.memberId})|"
                                                class="rounded-md bg-violet-200 px-6 py-1 text-sm font-medium text-violet-700 transition hover:bg-violet-300">
                                                휴직
                                            </button>
                                            <!--
                                                퇴사 버튼 (Danger, rose-200)
                                                ※ 클릭 시 사유 선택 모달을 띄워 자진퇴사(LEAVE) / 해고(BANNED) 를 고른다.
                                                  - data-member-name 은 모달 헤더에 "OOO 님을 퇴사 처리합니다" 처럼 보여주기 위한 보조 정보.
                                            -->
                                            <button type="button"
                                                class="btn-delete-hover rounded-md bg-rose-200 px-6 py-1 text-sm font-medium text-rose-500 transition js-resign-btn"
                                                th:attr="data-member-id=${emp.memberId},
                                                             data-member-name=${emp.name}">
                                                퇴사
                                            </button>
                                        </th:block>

                                        <!-- [휴직 직원 탭] 복귀 / 퇴사 -->
                                        <th:block th:if="${selectedStatusKey == 'ON_LEAVE'}">
                                            <!-- 복귀 버튼 (State Toggle - Restore, emerald-200) -->
                                            <button type="button" th:attr="onclick=|restoreMember(${emp.memberId})|"
                                                class="rounded-md bg-emerald-200 px-6 py-1 text-sm font-medium text-emerald-700 transition hover:bg-emerald-300">
                                                복귀
                                            </button>
                                            <!-- 퇴사 버튼 (Danger, rose-200) - 자진퇴사/해고 선택 모달 오픈 -->
                                            <button type="button"
                                                class="btn-delete-hover rounded-md bg-rose-200 px-6 py-1 text-sm font-medium text-rose-500 transition js-resign-btn"
                                                th:attr="data-member-id=${emp.memberId},
                                                             data-member-name=${emp.name}">
                                                퇴사
                                            </button>
                                        </th:block>

                                        <!--
                                            [퇴사 직원 탭] 액션 없음 (열람 전용)
                                            ※ 백엔드에서 LEAVE 탭 요청 시 상태 IN (LEAVE, BANNED) 로 묶어 내려준다는 전제.
                                            ※ emp.status 가 enum 이므로 .name() 으로 풀어서 비교.
                                        -->
                                        <!--
                                            [퇴사 직원 탭] 사유 뱃지
                                            ※ 빌드된 output.css 에 text-rose-700 / text-amber-700 유틸리티가 누락되어 있어
                                              inline style 로 정확한 색상값(#be123c, #b45309)을 강제 적용.
                                              Tailwind watcher 재빌드 후에는 클래스 방식으로 정리 가능.
                                            ※ 색상 의미: 자진퇴사(amber - 중립/주의), 해고(rose - 강한 경고)
                                        -->
                                        <th:block th:if="${selectedStatusKey == 'LEAVE'}">
                                            <!-- 자진퇴사 뱃지 (amber-700 = #b45309) -->
                                            <span th:if="${emp.status != null and emp.status.name() == 'LEAVE'}"
                                                style="color: #b45309;"
                                                class="inline-flex items-center justify-center rounded-full bg-amber-100 px-4 py-1.5 text-sm font-semibold dark:bg-amber-500/15">
                                                자진퇴사
                                            </span>
                                            <!-- 해고 뱃지 (rose-700 = #be123c) -->
                                            <span th:if="${emp.status != null and emp.status.name() == 'BANNED'}"
                                                style="color: #be123c;"
                                                class="inline-flex items-center justify-center rounded-full bg-rose-100 px-4 py-1.5 text-sm font-semibold dark:bg-rose-500/15">
                                                해고
                                            </span>
                                        </th:block>

                                    </div>
                                </div>
                            </div>
                        </div>

                        <!--
                            직원이 존재하지 않을 때 안내.
                            ※ AJAX 로 fragment 만 갱신될 때도 같이 그려져야 하므로 반드시 fragment 내부에 둔다.
                        -->
                        <div th:if="${members == null or #lists.isEmpty(members)}"
                            class="py-20 text-center text-gray-500 dark:text-gray-300">
                            <th:block th:if="${selectedStatusKey == 'ON_LEAVE'}">현재 휴직 중인 직원이 없습니다.</th:block>
                            <th:block th:if="${selectedStatusKey == 'LEAVE'}">퇴사 처리된 직원이 없습니다.</th:block>
                            <th:block th:if="${selectedStatusKey == 'JOIN'}">등록된 직원이 없습니다.</th:block>
                        </div>

                        </th:block><!-- /th:with selectedStatusKey -->
                    </div>
                </div>
        </div>
    </div>
    </div>
    </div>
    </main>


    <!-- 직원 정보 수정 카드 모달 -->
    <div id="editModal" class="fixed inset-0 z-[100000] flex items-center justify-center hidden bg-black/50">
        <div
            class="w-full max-w-2xl rounded-2xl border border-stroke bg-white p-8 shadow-2xl dark:border-strokedark dark:bg-boxdark mx-4">
            <h3 class="mb-8 text-2xl font-bold text-black dark:text-white">직원 정보 수정</h3>

            <div class="flex flex-col md:flex-row gap-10 items-start">
                <div class="relative mx-auto md:mx-0">
                    <div
                        class="h-40 w-40 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden border border-stroke">

                        <!-- 직원 이미지 수정 -->
                        <img id="modalProfileImg" src="" alt="Profile" class="h-full w-full object-cover hidden">
                        <svg id="modalDefaultSvg" class="h-24 w-24 text-slate-300" fill="currentColor"
                            viewBox="0 0 24 24">
                            <path
                                d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                    </div>

                    <input type="file" id="profileImgInput" class="hidden" accept="image/*">

                    <button type="button" onclick="document.querySelector('#profileImgInput').click()"
                        class="absolute bottom-2 right-2 rounded-full bg-white p-2 shadow-md border border-stroke hover:bg-gray-50 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600 dark:text-gray-300" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" name="profileImg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                </div>

                <div class="flex-1 w-full space-y-4">
                    <input type="hidden" id="editEmpId">

                    <div class="flex items-center gap-4">
                        <label class="w-24 text-lg font-bold text-black dark:text-white">이름</label>
                        <input type="text" id="editName" name="name"
                            class="flex-1 rounded border border-stroke bg-gray py-2 px-4 text-black focus:border-primary outline-none dark:text-white">
                    </div>

                    <!--
                        부서/직급은 단건 수정 모달에서는 읽기 전용으로 노출한다.
                        ※ 부서/직급 변경은 [인사이동] 일괄 변경 플로우로만 수행하기로 결정.
                        ※ 백엔드 updateMember API 가 deptId/positionId 를 required 로 받으므로
                          기존 값을 그대로 다시 보내기 위해 hidden input 으로 보존한다.
                        ※ 표시는 input(readOnly) 대신 회원 행과 동일한 배지/텍스트 패턴 — 한눈에 "수정 불가"임이 보이도록.
                    -->
                    <div class="flex items-center gap-4">

            <div class="mt-10 flex justify-center gap-4">
                <button onclick="updateMember()"
                    class="w-32 rounded-lg bg-indigo-200 py-3 font-semibold text-indigo-700 hover:bg-indigo-300 transition">수정</button>
                <button onclick="closeEditModal()"
                    class="w-32 rounded-lg bg-gray-200 py-3 font-semibold text-gray-700 transition hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">취소</button>

    <!--
        퇴사 사유 선택 모달
        ※ 활성/휴직 탭에서 [퇴사] 버튼을 누르면 열린다.
        ※ 자진퇴사 → POST /api/subAdmin/status/{id}/LEAVE
        ※ 해고     → POST /api/subAdmin/status/{id}/BANNED
        ※ 두 전이 모두 Status.ALLOWED 에 이미 정의되어 있다 (JOIN→{BANNED,LEAVE,ON_LEAVE}, ON_LEAVE→{JOIN,BANNED,LEAVE}).
    -->
    <div id="resignTypeModal" class="fixed inset-0 z-[100000] flex items-center justify-center hidden bg-black/50">
        <!--
            ※ Tailwind 의 max-w-* 유틸리티가 빌드된 output.css 에서 적용되지 않는 케이스가 확인되어
              inline style="max-width: 22rem;" 로 강제 (약 352px ≒ 1024px 화면의 1/3).
              p-5 로 내부 패딩 축소.
        -->
        <div
            style="max-width: 22rem;"
            class="w-full rounded-2xl border border-stroke bg-white p-5 shadow-2xl dark:border-strokedark dark:bg-boxdark mx-4">
            <h3 class="mb-2 text-lg font-bold text-black dark:text-white">퇴사 처리</h3>
            <p class="mb-1 text-sm text-gray-600 dark:text-gray-300">
                <span id="resignTargetName" class="font-semibold text-black dark:text-white">-</span> 님의 퇴사 사유 선택
            </p>
            <p class="mb-4 text-xs text-rose-500">처리 후에는 되돌릴 수 없습니다.</p>

            <!-- 대상 회원 ID 보관 (js 에서 사용) -->
            <input type="hidden" id="resignTargetId">

            <div class="flex flex-col gap-2">
                <!--
                    퇴사 사유 버튼
                    ※ 뱃지와 동일하게 색상 의미 맞춤 → 자진퇴사(amber - 주의), 해고(rose - 강한 경고)
                    ※ text-amber-700 / text-rose-700 도 output.css 빌드 누락 케이스가 있어 inline style 로 색상 강제.
                -->
                <!-- 자진퇴사: LEAVE (amber-700 = #b45309) -->
                <button type="button" onclick="confirmResign('LEAVE')"
                    style="color: #b45309;"
                    class="w-full rounded-lg bg-amber-100 py-2.5 text-sm font-semibold transition hover:bg-amber-200 dark:bg-amber-500/15">
                    자진퇴사 (LEAVE)
                </button>
                <!-- 해고: BANNED (rose-700 = #be123c) -->
                <button type="button" onclick="confirmResign('BANNED')"
                    style="color: #be123c;"
                    class="w-full rounded-lg bg-rose-100 py-2.5 text-sm font-semibold transition hover:bg-rose-200 dark:bg-rose-500/15">
                    해고 (BANNED)
                </button>
                <!-- 취소 -->
                <button type="button" onclick="closeResignModal()"
                    class="mt-1 w-full rounded-lg bg-gray-200 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-800">
                    취소
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/index.js"></script>
    <script>
        // 부서별 / 직위별 드롭다운 핸들러 — '신규 부서' / '신규 직급' 선택 시 해당 관리 페이지로 이동
        function onDeptSelectChange(sel) {
            if (sel.value === '__NEW_DEPT__') {
                sel.value = '';
                window.location.href = '/admin/dept/list';
                return;
            }
            loadMemberList();
        }
        function onPositionSelectChange(sel) {
            if (sel.value === '__NEW_POSITION__') {
                sel.value = '';
                window.location.href = '/admin/position/list';
                return;
            }
            loadMemberList();
        }
        // 직급 옵션을 positionLevel 내림차순으로 정렬 ('전체' / '신규 직급'은 상단 고정).
        // 인사이동 패널의 직급 select 도 같은 규칙으로 정렬한다.
        (function sortPositionOptions() {
            ['positionSelect', 'reassignPositionSelect'].forEach((id) => {
                const sel = document.getElementById(id);
                if (!sel) return;
                const fixed = [];
                const dynamic = [];
                for (const opt of Array.from(sel.options)) {
                    if (opt.value === '' || opt.value === '__NEW_POSITION__') {
                        fixed.push(opt);
                    } else {
                        dynamic.push(opt);
                    }
                }
                dynamic.sort((a, b) =>
                    (parseInt(b.dataset.level || '0', 10)) - (parseInt(a.dataset.level || '0', 10))
                );
                sel.innerHTML = '';
                fixed.forEach(o => sel.appendChild(o));
                dynamic.forEach(o => sel.appendChild(o));
            });
        })();
    </script>
    <script src="/js/subAdmin/memberList.js"></script>
