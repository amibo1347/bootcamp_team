<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>
        Waiting List
    </title>
    <link rel="stylesheet" href="/css/output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->


            <!-- 승인 대기 목록 타이틀 -->
            <div class="flex items-center mx-4 my-5">
                <h2 class="text-2xl text-black font-black">
                    승인 대기 목록
                </h2>

                <span th:if="${count}" class="ml-3 px-4 py-1 text-sm font-medium text-white bg-rose-200 rounded-full">
                    <span th:text="${count}"></span>명
                </span>
            </div>

            <div th:each="member : ${members}"
                class="flex items-center justify-between p-6 mx-4 mb-4 bg-white border border-gray-200 rounded-3xl shadow-sm">

                <div class="flex items-center space-x-4">

                    <!-- 가입 신청 직원 사진 -->
                    <div class="w-20 h-20 bg-gray-100 rounded-full flex-shrink-0"></div>

                    <!-- 가입 신청 직원 이름 & 부서 -->
                    <div class="flex flex-col min-w-[100px]">
                        <div class="text-base font-bold text-gray-900" th:text="${member.name}"></div>
                        <div class="text-sm font-semibold text-gray-400">
                            <span th:if="${member.dept}" th:text="${member.dept.deptName}"></span>
                            <span th:unless="${member.dept}">소속 없음</span>
                        </div>
                    </div>

                    <!-- 가입 신청 직원 직급 선택 드롭다운 -->
                    <div x-data="{ open: false, selectedName: '직급 선택', selectedId: '' }" class="relative w-40">

                        <input type="hidden" name="positionId" :value="selectedId">

                        <button @click="open = !open" type="button"
                            class="w-full h-8 px-4 text-left border-2 border-gray-200 rounded-xl bg-white focus:border-blue-400 flex justify-between items-center">
                            <span x-text="selectedName"></span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <div x-show="open" @click.away="open = false"
                            class="absolute z-10 w-full mt-2 bg-white border border-gray-200 rounded-2xl shadow-lg overflow-hidden">

                            <button th:each="pos : ${positions}" type="button" th:data-pos-name="${pos.positionName}"
                                th:data-pos-id="${pos.positionId}"
                                @click="selectedName = $el.dataset.posName; selectedId = $el.dataset.posId; open = false"
                                class="w-full px-4 py-3 text-left hover:bg-blue-50 transition-colors text-gray-700"
                                th:text="${pos.positionName}">
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 가입 신청 직원 승인 & 거절 버튼 -->
                <div class="flex items-center space-x-3">
                    <button type="button" th:attr="onclick=|approveMember(${member.memberId})|"
                        class="h-8 px-8 text-base font-bold text-white bg-blue-400 hover:bg-blue-600 rounded-xl transition-all shadow-md active:scale-95">
                        승인
                    </button>

                    <button type="button" th:attr="onclick=|rejectMember(${member.memberId})|"
                        class="h-8 px-8 text-base font-bold text-white bg-rose-400 hover:bg-red-600 rounded-xl transition-all shadow-md active:scale-95">
                        거절
                    </button>
                </div>
            </div>
            <!-- ===== Main Content End ===== -->



            <!-- ===== Content Area End ===== -->
        </div>
        <!-- ===== Page Wrapper End ===== -->
        <script type="module" src="/js/index.js"></script>
        <script src="/js/subAdmin/waitingList.js"></script>
</body>

</html>
