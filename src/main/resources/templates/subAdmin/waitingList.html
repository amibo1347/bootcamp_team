<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>
        Waiting List
    </title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <th:block th:replace="~{partials/darkmode-style :: darkmodeStyle}"></th:block>
    <style>
        /* 삭제/거절 버튼 호버 색상을 고정한다(Tailwind 빌드 여부와 무관하게 적용) */
        .btn-delete-hover:hover {
            background-color: #fda4af;
        }
    </style>
</head>

<body
    x-data="{ page: 'ecommerce', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <!-- ===== 로딩 화면 ===== -->
    <div th:replace="~{partials/preloader}"></div>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="flex h-screen overflow-hidden">
        <!-- ===== 사이드바 ===== -->
        <div th:replace="~{partials/sidebar}"></div>
        <!-- ===== Sidebar End ===== -->

        <!-- ===== Content Area Start ===== -->
        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">
            <!-- Small Device Overlay Start -->
            <div th:replace="~{partials/overlay}"></div>
            <!-- Small Device Overlay End -->

            <!-- ===== Header Start ===== -->
            <div th:replace="~{partials/header}"></div>
            <!-- ===== Header End ===== -->

            <!-- ===== Main Content Start ===== -->


            <!-- 승인 대기 목록 타이틀 -->
            <main class="p-8 space-y-8">
                <div class="flex items-center">
                    <h2 class="ml-2 text-2xl font-black text-gray-900 dark:text-white">
                        승인 대기 목록
                    </h2>

                    <span th:if="${count}"
                        class="ml-3 px-4 py-1 text-sm font-medium text-white bg-rose-200 rounded-full">
                        <span th:text="${count}"></span>명
                    </span>
                </div>

                <div th:each="member : ${members}"
                    class="mx-4 mb-4 flex items-center justify-between rounded-3xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-boxdark">

                    <div class="flex items-center space-x-4">

                        <!-- 가입 신청 직원 사진 -->
                        <div class="h-20 w-20 shrink-0 rounded-full bg-gray-100 dark:bg-meta-4"></div>

                        <!-- 가입 신청 직원 이름 & 부서 -->

                        <div class="flex min-w-[100px] flex-col">
                            <div class="text-base font-bold text-gray-900 dark:text-white" th:text="${member.name}"></div>
                            <div class="text-sm font-semibold text-gray-400 dark:text-gray-300">
                                <span th:if="${member.dept}" th:text="${member.dept.deptName}"></span>
                                <span th:unless="${member.dept}">소속 없음</span>
                            </div>

                            <input type="hidden" th:id="'dept-' + ${member.memberId}"
                                th:value="${member.dept != null ? member.dept.deptId : ''}">
                        </div>


                        <!-- 가입 신청 직원 직급 선택 드롭다운 -->
                        <div class="relative z-20 w-40">
                            <select th:id="'position-' + ${member.memberId}" name="positionId"
                                class="js-custom-select h-8 w-full rounded-xl border-2 border-gray-200 bg-white px-3 text-sm text-gray-900 outline-none focus:border-blue-400 dark:border-strokedark dark:bg-meta-4 dark:text-gray-300">
                                <option value="">직급 선택</option>
                                <option th:each="pos : ${positions}" th:value="${pos.positionId}"
                                    th:text="${pos.positionName}"></option>
                            </select>
                        </div>
                    </div>

                    <!-- 가입 신청 직원 승인 & 거절 버튼 -->
                    <div class="flex items-center space-x-3">
                        <button type="button" th:attr="onclick=|approveMember(${member.memberId})|"
                            class="h-8 px-8 text-base font-bold text-indigo-700 bg-indigo-200 hover:bg-indigo-300 rounded-xl transition-all shadow-md active:scale-95">
                            승인
                        </button>

                        <button type="button" th:attr="onclick=|rejectMember(${member.memberId})|"
                            class="btn-delete-hover h-8 px-8 text-base font-bold text-rose-500 bg-rose-200 rounded-xl transition-all shadow-md active:scale-95">
                            거절
                        </button>
                    </div>
                </div>
            </main>
            <!-- ===== Main Content End ===== -->



            <!-- ===== Content Area End ===== -->
        </div>
        <!-- ===== Page Wrapper End ===== -->
        <script type="module" src="/js/index.js"></script>
        <script src="/js/subAdmin/waitingList.js"></script>
</body>

</html>
