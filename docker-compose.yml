services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: intranet-backend:local
    container_name: intranet-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # Oracle Autonomous DB (Wallet-based) — override via .env
      DB_TNS_NAME: ${DB_TNS_NAME:-intranetdb_high}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      TNS_ADMIN: /app/wallet

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}

      # CORS — comma separated origins for the Next.js dev server / deployed frontend
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      # Mount the Oracle Wallet from the host. Point WALLET_PATH at your local Wallet_IntranetDB dir.
      - ${WALLET_PATH:-./backend/src/main/resources/Wallet_IntranetDB}:/app/wallet:ro
    restart: unless-stopped
