spring:
  datasource:
    url: jdbc:oracle:thin:@${DB_TNS_NAME:intranetdb_high}?TNS_ADMIN=${TNS_ADMIN:/app/wallet}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
